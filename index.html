<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PMWEB - 项目管理</title>
  <style>
    :root {
      --color-bg: #f5f6fa;
      --color-surface: #ffffff;
      --color-border: #e0e0e0;
      --color-primary: #4a90d9;
      --color-primary-hover: #357abd;
      --color-text: #333333;
      --color-text-light: #888888;
      --color-danger: #e74c3c;
      --sidebar-width: 260px;
      --toolbar-height: 48px;
      --statusbar-height: 28px;
    }

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, "Microsoft YaHei", "PingFang SC", "Helvetica Neue", sans-serif;
      background: var(--color-bg);
      color: var(--color-text);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ===== TOOLBAR ===== */
    #toolbar {
      height: var(--toolbar-height);
      background: var(--color-surface);
      border-bottom: 1px solid var(--color-border);
      display: flex;
      align-items: center;
      padding: 0 12px;
      gap: 8px;
      flex-shrink: 0;
      z-index: 10;
    }

    #toolbar .toolbar-title {
      font-size: 16px;
      font-weight: 600;
      color: var(--color-text);
      margin-right: 8px;
    }

    #toolbar .toolbar-sep {
      width: 1px;
      height: 20px;
      background: var(--color-border);
      margin: 0 4px;
    }

    .btn {
      padding: 6px 12px;
      border: 1px solid var(--color-border);
      border-radius: 4px;
      background: var(--color-surface);
      color: var(--color-text);
      cursor: pointer;
      font-size: 13px;
      font-family: inherit;
      transition: background 0.15s, border-color 0.15s, color 0.15s;
      white-space: nowrap;
    }

    .btn:hover {
      background: var(--color-bg);
      border-color: var(--color-primary);
    }

    .btn.active {
      background: var(--color-primary);
      border-color: var(--color-primary);
      color: #ffffff;
    }

    .btn.btn-primary {
      background: var(--color-primary);
      border-color: var(--color-primary);
      color: #ffffff;
    }

    .btn.btn-primary:hover {
      background: var(--color-primary-hover);
      border-color: var(--color-primary-hover);
    }

    .btn.btn-danger {
      background: var(--color-danger);
      border-color: var(--color-danger);
      color: #ffffff;
    }

    .btn.btn-danger:hover {
      background: #c0392b;
      border-color: #c0392b;
    }

    #toolbar .btn-group {
      display: flex;
      gap: 4px;
      align-items: center;
    }

    #toolbar .spacer {
      flex: 1;
    }

    /* ===== MAIN CONTAINER ===== */
    #main-container {
      flex: 1;
      display: flex;
      flex-direction: row;
      overflow: hidden;
    }

    /* ===== SIDEBAR ===== */
    #sidebar {
      width: var(--sidebar-width);
      min-width: 180px;
      max-width: 500px;
      flex-shrink: 0;
      background: var(--color-surface);
      display: flex;
      flex-direction: column;
      overflow-y: auto;
      position: relative;
    }

    #sidebar-resize-handle {
      position: absolute;
      right: 0;
      top: 0;
      bottom: 0;
      width: 6px;
      cursor: col-resize;
      background: transparent;
      transition: background 0.15s;
      z-index: 10;
    }

    #sidebar-resize-handle:hover,
    #sidebar-resize-handle.dragging {
      background: var(--color-primary);
    }

    #sidebar-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 14px;
      border-bottom: 1px solid var(--color-border);
      flex-shrink: 0;
    }

    #sidebar-header h2 {
      font-size: 14px;
      font-weight: 600;
      color: var(--color-text);
    }

    #tree-container {
      flex: 1;
      padding: 8px 0;
      overflow-y: auto;
      position: relative;
    }

    /* ===== CONTENT AREA ===== */
    #content-area {
      flex: 1;
      overflow: auto;
      position: relative;
      background: var(--color-bg);
    }

    #content-placeholder {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: var(--color-text-light);
      font-size: 14px;
    }

    /* ===== STATUS BAR ===== */
    #status-bar {
      height: var(--statusbar-height);
      background: var(--color-surface);
      border-top: 1px solid var(--color-border);
      display: flex;
      align-items: center;
      padding: 0 14px;
      gap: 16px;
      flex-shrink: 0;
      font-size: 12px;
      color: var(--color-text-light);
    }

    #status-bar .status-item {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    /* == 模态框 == */
    .modal-overlay {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.4);
      z-index: 1000;
      justify-content: center;
      align-items: center;
    }
    .modal-overlay.active { display: flex; }
    .modal-box {
      background: #fff;
      border-radius: 8px;
      padding: 24px;
      min-width: 360px;
      max-width: 500px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.15);
    }
    .modal-title {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 16px;
    }
    .modal-field {
      margin-bottom: 12px;
    }
    .modal-field label {
      display: block;
      font-size: 13px;
      color: var(--color-text-light);
      margin-bottom: 4px;
    }
    .modal-field input,
    .modal-field select {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid var(--color-border);
      border-radius: 4px;
      font-size: 14px;
    }
    .modal-actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      margin-top: 20px;
    }
    .modal-actions button {
      padding: 8px 16px;
      border-radius: 4px;
      border: 1px solid var(--color-border);
      cursor: pointer;
      font-size: 13px;
    }
    .modal-actions .btn-primary {
      background: var(--color-primary);
      color: #fff;
      border-color: var(--color-primary);
    }
    .modal-actions .btn-primary:hover { background: var(--color-primary-hover); }
    .modal-actions .btn-danger {
      background: var(--color-danger);
      color: #fff;
      border-color: var(--color-danger);
    }

    /* == 树形列表 == */
    .tree-node {
      position: relative;
    }
    .tree-node-row {
      display: flex;
      align-items: center;
      padding: 6px 8px;
      cursor: pointer;
      font-size: 13px;
      gap: 4px;
      position: relative;
    }
    .tree-node-row:hover { background: #f0f4ff; }
    .tree-node-row.selected { background: #e3ecfa; }
    .tree-node-row.highlighted { background: #fff3cd; }
    .tree-node-row .arrow {
      font-size: 10px;
      width: 16px;
      text-align: center;
      color: var(--color-text-light);
      flex-shrink: 0;
      transition: transform 0.15s;
    }
    .tree-node-row .arrow.collapsed { transform: rotate(-90deg); }
    .tree-node-row .arrow.empty { visibility: hidden; }
    .tree-node-row .color-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .tree-node-row .node-name {
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .tree-node-row .status-icon {
      font-size: 11px;
      flex-shrink: 0;
    }
    .tree-node-row .node-actions {
      display: none;
      gap: 2px;
      flex-shrink: 0;
    }
    .tree-node-row:hover .node-actions { display: flex; }
    .tree-node-row .node-actions button {
      padding: 0 4px;
      border: none;
      background: transparent;
      cursor: pointer;
      font-size: 14px;
      color: var(--color-text-light);
      border-radius: 3px;
    }
    .tree-node-row .node-actions button:hover {
      background: var(--color-border);
      color: var(--color-text);
    }
    .tree-children {
      overflow: hidden;
    }
    .tree-children.collapsed { display: none; }
    /* Indentation per depth level */
    .tree-node[data-depth="0"] > .tree-node-row { padding-left: 8px; }
    .tree-node[data-depth="1"] > .tree-node-row { padding-left: 28px; }
    .tree-node[data-depth="2"] > .tree-node-row { padding-left: 48px; }

    /* == Tree drag and drop == */
    .tree-node-row[draggable="true"] {
      cursor: grab;
    }
    .tree-node-row[draggable="true"]:active {
      cursor: grabbing;
    }
    .tree-insert-line {
      position: absolute;
      left: 0;
      right: 0;
      height: 2px;
      background: #4a90d9;
      z-index: 100;
      pointer-events: none;
    }
    .tree-insert-line.invalid {
      background: #e74c3c;
    }

    /* == 右键菜单 == */
    .context-menu {
      display: none;
      position: fixed;
      background: #fff;
      border: 1px solid var(--color-border);
      border-radius: 6px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.12);
      z-index: 2000;
      min-width: 140px;
      padding: 4px 0;
    }
    .context-menu.active { display: block; }
    .context-menu-item {
      padding: 8px 16px;
      font-size: 13px;
      cursor: pointer;
    }
    .context-menu-item:hover { background: #f0f4ff; }
    .context-menu-item.danger { color: var(--color-danger); }

    /* == 甘特图 == */
    .gantt-container {
      display: flex;
      flex-direction: column;
      height: 100%;
      overflow: hidden;
    }
    .gantt-header-wrapper {
      overflow: hidden;
      flex-shrink: 0;
      background: var(--color-surface);
    }
    .gantt-header {
      display: flex;
      border-bottom: 1px solid var(--color-border);
      background: var(--color-surface);
      flex-shrink: 0;
    }
    .gantt-header-cell {
      flex-shrink: 0;
      text-align: center;
      font-size: 11px;
      color: var(--color-text-light);
      border-right: 1px solid #eee;
      padding: 3px 0;
      position: relative;
      line-height: 1.3;
    }
    .gantt-header-cell .weekday {
      font-size: 10px;
      color: #888;
    }
    .gantt-header-cell.weekend {
      color: #e74c3c;
    }
    .gantt-header-cell.weekend .weekday {
      color: #e74c3c;
    }
    .gantt-body {
      flex: 1;
      overflow: auto;
      position: relative;
    }
    .gantt-row {
      display: flex;
      position: relative;
      height: 36px;
      border-bottom: 1px solid #f0f0f0;
      align-items: center;
    }
    .gantt-row:hover { background: #fafbfe; }
    .gantt-grid-cell {
      flex-shrink: 0;
      height: 100%;
      border-right: 1px solid #f0f0f0;
    }
    .gantt-grid-cell.today {
      background: rgba(74, 144, 217, 0.06);
    }
    .gantt-grid-cell.weekend {
      background: rgba(0,0,0,0.02);
    }
    .gantt-bar {
      position: absolute;
      height: 20px;
      border-radius: 3px;
      top: 8px;
      cursor: grab;
      font-size: 11px;
      color: #fff;
      display: flex;
      align-items: center;
      padding: 0 6px;
      overflow: hidden;
      white-space: nowrap;
      min-width: 20px;
      transition: transform 0.12s, box-shadow 0.12s;
    }
    .gantt-bar:hover {
      filter: brightness(1.1);
      transform: translateY(-1px);
      box-shadow: 0 2px 8px rgba(0,0,0,0.18);
    }
    .gantt-bar.status-done { opacity: 0.6; }
    .gantt-bar.highlight {
      filter: brightness(1.2);
      box-shadow: 0 0 8px rgba(74, 144, 217, 0.6);
      z-index: 4;
    }
    .gantt-bar.selected {
      box-shadow: 0 0 0 2px var(--color-primary), 0 0 12px rgba(74, 144, 217, 0.4);
      z-index: 4;
    }
    .gantt-bar-dates {
      opacity: 0.85;
      margin-left: 4px;
      font-size: 10px;
    }
    .gantt-milestone {
      position: absolute;
      top: 4px;
      width: 20px; height: 20px;
      cursor: grab;
      font-size: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 5;
      transform: translateX(-10px);
      color: #E74C3C;
      filter: drop-shadow(0 0 2px #fff) drop-shadow(0 0 2px #fff);
      transition: transform 0.15s;
    }
    .gantt-milestone::before {
      content: '';
      position: absolute;
      width: 28px;
      height: 28px;
      top: -4px;
      left: -4px;
      border-radius: 50%;
      pointer-events: none;
    }
    .gantt-milestone:hover { transform: translateX(-10px) scale(1.2); }
    .gantt-drag-tooltip {
      position: fixed;
      background: rgba(0,0,0,0.8);
      color: #fff;
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 12px;
      pointer-events: none;
      z-index: 100;
      white-space: nowrap;
    }
    .drag-ghost {
      position: fixed;
      opacity: 0.6;
      pointer-events: none;
      z-index: 9999;
    }
    .drag-ghost-bar {
      height: 20px;
      border-radius: 3px;
      font-size: 11px;
      color: #fff;
      display: flex;
      align-items: center;
      padding: 0 6px;
      overflow: hidden;
      white-space: nowrap;
    }
    .drag-ghost-milestone {
      font-size: 16px;
      color: #E74C3C;
      filter: drop-shadow(0 0 2px #fff) drop-shadow(0 0 2px #fff);
    }
    .snap-line {
      position: absolute;
      top: 0;
      width: 1px;
      height: 100%;
      background: var(--color-primary);
      opacity: 0.5;
      pointer-events: none;
      z-index: 50;
    }
    .gantt-today-line {
      position: absolute;
      top: 0;
      bottom: 0;
      width: 2px;
      background: var(--color-danger);
      z-index: 5;
      pointer-events: none;
    }
    .gantt-empty {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: var(--color-text-light);
      font-size: 14px;
    }

    /* == 日历视图 == */
    .calendar-container {
      padding: 16px;
      height: 100%;
      display: flex;
      flex-direction: column;
    }
    .calendar-nav {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      margin-bottom: 12px;
      flex-shrink: 0;
    }
    .calendar-nav button {
      padding: 4px 12px;
      border: 1px solid var(--color-border);
      border-radius: 4px;
      background: var(--color-surface);
      cursor: pointer;
      font-size: 14px;
    }
    .calendar-nav button:hover { background: #f0f0f0; }
    .calendar-nav .month-label {
      font-size: 16px;
      font-weight: 600;
      min-width: 120px;
      text-align: center;
    }
    .calendar-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      flex: 1;
      gap: 1px;
      background: var(--color-border);
      border: 1px solid var(--color-border);
      border-radius: 4px;
      overflow: hidden;
    }
    .calendar-weekday {
      background: #f8f9fa;
      text-align: center;
      font-size: 12px;
      font-weight: 600;
      color: var(--color-text-light);
      padding: 8px 4px;
    }
    .calendar-day {
      background: var(--color-surface);
      min-height: 80px;
      padding: 4px;
      cursor: pointer;
      overflow: hidden;
    }
    .calendar-day:hover { background: #f8f9fc; }
    .calendar-day.other-month {
      background: #fafafa;
      color: #ccc;
    }
    .calendar-day.today {
      background: #f0f4ff;
    }
    .calendar-day-number {
      font-size: 12px;
      font-weight: 600;
      margin-bottom: 4px;
    }
    .calendar-task-bar {
      font-size: 10px;
      color: #fff;
      padding: 1px 4px;
      border-radius: 2px;
      margin-bottom: 2px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      cursor: pointer;
    }
    .calendar-milestone-item {
      font-size: 10px;
      display: flex;
      align-items: center;
      gap: 2px;
      cursor: pointer;
      color: #E74C3C;
      font-weight: 600;
    }
    .calendar-milestone-item:hover { text-decoration: underline; }
    .calendar-task-bar.highlight {
      filter: brightness(1.3);
      box-shadow: 0 0 4px rgba(74, 144, 217, 0.5);
    }
    .calendar-task-bar.selected {
      box-shadow: 0 0 0 1px var(--color-primary);
    }
  </style>
</head>
<body>

  <!-- TOOLBAR -->
  <div id="toolbar">
    <span class="toolbar-title">PMWEB</span>
    <div class="toolbar-sep"></div>
    <div class="toolbar-group">
      <button class="btn" id="btn-import">导入</button>
      <button class="btn" id="btn-export">导出JSON</button>
      <button class="btn" id="btn-export-excel">导出Excel</button>
    </div>
    <div class="toolbar-sep"></div>
    <div class="btn-group" id="view-toggle-group">
      <button class="btn active" id="btn-view-gantt">甘特图</button>
      <button class="btn" id="btn-view-calendar">日历</button>
    </div>
    <div class="toolbar-sep"></div>
    <div class="btn-group" id="granularity-group">
      <button class="btn" id="btn-granularity-year">年</button>
      <button class="btn active" id="btn-granularity-month">月</button>
      <button class="btn" id="btn-granularity-week">周</button>
    </div>
  </div>

  <!-- MAIN CONTAINER -->
  <div id="main-container">

    <!-- SIDEBAR -->
    <div id="sidebar">
      <div id="sidebar-resize-handle"></div>
      <div id="sidebar-header">
        <h2>任务列表</h2>
      </div>
      <div id="tree-container"></div>
      <div id="sidebar-footer" style="padding:8px 12px;border-top:1px solid var(--color-border);flex-shrink:0;">
        <button class="btn btn-primary" id="btn-add-root-task" style="width:100%;padding:8px;">+ 新建顶层任务</button>
      </div>
    </div>

    <!-- CONTENT AREA -->
    <div id="content-area">
      <div id="content-placeholder">请选择或新建项目</div>
    </div>

  </div>

  <!-- STATUS BAR -->
  <div id="status-bar">
    <span class="status-item" id="status-text">0 个任务</span>
    <span class="spacer" style="flex:1"></span>
    <span class="status-item" id="status-info">PMWEB v2.0</span>
  </div>

  <!-- MODAL OVERLAY -->
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal-box" id="modal-box"></div>
  </div>

  <script>
  // ============================================================
  // DataStore — localStorage persistence + JSON import/export (v2)
  // ============================================================
  const DataStore = {
    STORAGE_KEY: 'pmweb_data',
    CURRENT_VERSION: 2,

    createEmpty: function() {
      return {
        pmweb_version: this.CURRENT_VERSION,
        tasks: [],
        milestones: [],
        settings: { lastView: 'gantt', lastGranularity: 'month' }
      };
    },

    load: function() {
      try {
        var raw = localStorage.getItem(this.STORAGE_KEY);
        if (!raw) return this.createEmpty();
        var data = JSON.parse(raw);
        return this.migrate(data);
      } catch (e) {
        console.error('DataStore.load failed:', e);
        return this.createEmpty();
      }
    },

    save: function(data) {
      try {
        localStorage.setItem(this.STORAGE_KEY, JSON.stringify(data));
      } catch (e) {
        console.error('DataStore.save failed:', e);
        alert('数据保存失败，可能 localStorage 已满');
      }
    },

    exportJSON: function(data) {
      var exportData = JSON.parse(JSON.stringify(data));
      exportData.exported_at = new Date().toISOString();
      var blob = new Blob([JSON.stringify(exportData, null, 2)], { type: 'application/json' });
      var url = URL.createObjectURL(blob);
      var a = document.createElement('a');
      a.href = url;
      a.download = 'pmweb-backup-' + new Date().toISOString().slice(0, 10) + '.json';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    },

    importJSON: function(file) {
      var self = this;
      return new Promise(function(resolve, reject) {
        var reader = new FileReader();
        reader.onload = function(e) {
          try {
            var data = JSON.parse(e.target.result);
            if (!data.version && !data.pmweb_version) {
              reject(new Error('JSON 格式不正确：缺少版本号'));
              return;
            }
            var migrated = self.migrate(data);
            resolve(migrated);
          } catch (err) {
            reject(new Error('JSON 解析失败：文件内容无效'));
          }
        };
        reader.onerror = function() { reject(new Error('文件读取失败')); };
        reader.readAsText(file);
      });
    },

    migrate: function(data) {
      var version = data.pmweb_version || data.version || 0;
      if (version > this.CURRENT_VERSION) {
        alert('数据版本过新（v' + version + '），请升级软件。当前支持最高版本：v' + this.CURRENT_VERSION);
        return this.createEmpty();
      }
      if (version < 2) {
        data = this._migrateV1toV2(data);
      }
      return data;
    },

    _migrateV1toV2: function(v1) {
      var v2 = {
        pmweb_version: 2,
        tasks: [],
        milestones: [],
        settings: v1.settings || { lastView: 'gantt', lastGranularity: 'month' }
      };
      var projectIdMap = {};
      var projects = v1.projects || [];
      projects.forEach(function(p, i) {
        var newId = DataStore.uuid();
        projectIdMap[p.id] = newId;
        v2.tasks.push({
          id: newId, parentId: null, name: p.name, description: '', assignee: '',
          color: p.color || '#4a90d9', startDate: null, endDate: null,
          status: 'todo', order: i, ganttRow: null
        });
      });
      var oldTasks = v1.tasks || [];
      oldTasks.forEach(function(t) {
        var parentId = projectIdMap[t.projectId] || null;
        v2.tasks.push({
          id: t.id, parentId: parentId, name: t.name,
          description: t.description || '', assignee: t.assignee || '',
          color: null, startDate: t.startDate, endDate: t.endDate,
          status: t.status || 'todo', order: t.order || 0, ganttRow: null
        });
      });
      var oldMilestones = v1.milestones || [];
      oldMilestones.forEach(function(m) {
        var taskId = m.taskId;
        if (!taskId && m.projectId) {
          taskId = projectIdMap[m.projectId] || null;
        }
        if (taskId) {
          v2.milestones.push({
            id: m.id, taskId: taskId, name: m.name, date: m.date, icon: m.icon || '◆'
          });
        }
      });
      return v2;
    },

    formatDate: function(d) {
      return d.getFullYear() + '-' +
        String(d.getMonth() + 1).padStart(2, '0') + '-' +
        String(d.getDate()).padStart(2, '0');
    },

    uuid: function() {
      return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c) {
        var r = Math.random() * 16 | 0;
        return (c === 'x' ? r : (r & 0x3 | 0x8)).toString(16);
      });
    }
  };

  // ============================================================
  // == TaskManager: 统一任务树 CRUD (replaces ProjectManager)
  // ============================================================
  var TaskManager = {
    data: null,
    COLORS: ['#4a90d9', '#e67e22', '#2ecc71', '#9b59b6', '#e74c3c', '#1abc9c', '#f39c12', '#3498db', '#e91e63', '#00bcd4', '#8bc34a', '#ff5722'],

    init: function() {
      this.data = DataStore.load();
    },

    _save: function() {
      DataStore.save(this.data);
    },

    getDepth: function(taskId) {
      var depth = 0;
      var task = this.getTask(taskId);
      while (task && task.parentId) {
        depth++;
        task = this.getTask(task.parentId);
        if (depth > 3) break;
      }
      return depth;
    },

    getTask: function(id) {
      return this.data.tasks.find(function(t) { return t.id === id; }) || null;
    },

    getRootTasks: function() {
      return this.data.tasks
        .filter(function(t) { return t.parentId === null; })
        .sort(function(a, b) { return a.order - b.order; });
    },

    getChildren: function(parentId) {
      return this.data.tasks
        .filter(function(t) { return t.parentId === parentId; })
        .sort(function(a, b) { return a.order - b.order; });
    },

    getDescendants: function(taskId) {
      var result = [];
      var self = this;
      var children = this.getChildren(taskId);
      children.forEach(function(child) {
        result.push(child);
        result = result.concat(self.getDescendants(child.id));
      });
      return result;
    },

    getAllTasks: function() {
      return this.data.tasks.slice();
    },

    getEffectiveColor: function(task) {
      if (task.color) return task.color;
      if (task.parentId) {
        var parent = this.getTask(task.parentId);
        if (parent) return this.getEffectiveColor(parent);
      }
      return '#4a90d9';
    },

    getDateRange: function(task) {
      if (task.startDate && task.endDate) {
        return { startDate: task.startDate, endDate: task.endDate };
      }
      var children = this.getChildren(task.id);
      if (children.length === 0) {
        return { startDate: null, endDate: null };
      }
      var minStart = null;
      var maxEnd = null;
      var self = this;
      children.forEach(function(child) {
        var range = self.getDateRange(child);
        if (range.startDate) {
          if (!minStart || range.startDate < minStart) minStart = range.startDate;
        }
        if (range.endDate) {
          if (!maxEnd || range.endDate > maxEnd) maxEnd = range.endDate;
        }
      });
      return { startDate: minStart, endDate: maxEnd };
    },

    addTask: function(parentId, name) {
      if (parentId) {
        var depth = this.getDepth(parentId);
        if (depth >= 2) {
          alert('最多支持 3 层任务');
          return null;
        }
      }
      var siblings = parentId ? this.getChildren(parentId) : this.getRootTasks();
      var color = null;
      if (!parentId) {
        color = this.COLORS[this.data.tasks.filter(function(t) { return t.parentId === null; }).length % this.COLORS.length];
      }
      var today = DataStore.formatDate(new Date());
      var weekLater = DataStore.formatDate(new Date(Date.now() + 7 * 86400000));
      var task = {
        id: DataStore.uuid(), parentId: parentId, name: name.trim(),
        description: '', assignee: '', color: color,
        startDate: today, endDate: weekLater, status: 'todo',
        order: siblings.length, ganttRow: null
      };
      this.data.tasks.push(task);
      this._save();
      return task;
    },

    updateTask: function(id, updates) {
      var task = this.getTask(id);
      if (!task) return null;
      var newStart = updates.startDate !== undefined ? updates.startDate : task.startDate;
      var newEnd = updates.endDate !== undefined ? updates.endDate : task.endDate;
      if (newStart && newEnd && newEnd < newStart) {
        alert('结束日期不能早于开始日期');
        return null;
      }
      var allowed = ['name', 'description', 'assignee', 'color', 'startDate', 'endDate', 'status', 'order', 'ganttRow', 'parentId'];
      for (var i = 0; i < allowed.length; i++) {
        var key = allowed[i];
        if (updates[key] !== undefined) {
          task[key] = updates[key];
        }
      }
      if (updates.name !== undefined) task.name = task.name.trim();
      if (updates.assignee !== undefined && task.assignee) task.assignee = task.assignee.trim();
      this._save();
      return task;
    },

    deleteTask: function(id) {
      var descendants = this.getDescendants(id);
      var idsToDelete = [id];
      descendants.forEach(function(d) { idsToDelete.push(d.id); });
      this.data.milestones = this.data.milestones.filter(function(m) {
        return idsToDelete.indexOf(m.taskId) === -1;
      });
      this.data.tasks = this.data.tasks.filter(function(t) {
        return idsToDelete.indexOf(t.id) === -1;
      });
      this._save();
    },

    moveTask: function(taskId, newParentId, newOrder) {
      var task = this.getTask(taskId);
      if (!task) return false;

      // Prevent moving to self or descendant
      if (taskId === newParentId) return false;
      var descendants = this.getDescendants(taskId);
      for (var i = 0; i < descendants.length; i++) {
        if (descendants[i].id === newParentId) return false;
      }

      // Check depth limit (max 3 layers, depth 0-2)
      var newDepth = 0;
      if (newParentId) {
        newDepth = this.getDepth(newParentId) + 1;
      }

      // Calculate max descendant depth
      var maxDescendantDepth = 0;
      if (descendants.length > 0) {
        for (var i = 0; i < descendants.length; i++) {
          var d = this.getDepth(descendants[i].id);
          if (d > maxDescendantDepth) maxDescendantDepth = d;
        }
      }

      // New depth + relative descendant depth must not exceed limit
      var relativeDescendantDepth = maxDescendantDepth - this.getDepth(taskId);
      if (newDepth + relativeDescendantDepth > 2) {
        alert('移动后子任务层级将超过限制（最多支持 3 层）');
        return false;
      }

      // Get old siblings to reorder
      var oldSiblings = task.parentId ? this.getChildren(task.parentId) : this.getRootTasks();

      // Get new siblings
      var newSiblings = newParentId ? this.getChildren(newParentId) : this.getRootTasks();

      // Remove task from old siblings list (for order recalculation)
      oldSiblings = oldSiblings.filter(function(t) { return t.id !== taskId; });

      // If same parent, remove from newSiblings too and adjust newOrder
      if (task.parentId === newParentId) {
        var oldIndex = newSiblings.findIndex(function(t) { return t.id === taskId; });
        newSiblings = newSiblings.filter(function(t) { return t.id !== taskId; });
        // Adjust newOrder if moving within same parent
        if (oldIndex >= 0 && newOrder > oldIndex) {
          newOrder--;
        }
      }

      // Insert into new position
      if (newOrder < 0) newOrder = 0;
      if (newOrder > newSiblings.length) newOrder = newSiblings.length;

      // Update task's parentId
      task.parentId = newParentId;

      // Rebuild order for old siblings
      for (var i = 0; i < oldSiblings.length; i++) {
        oldSiblings[i].order = i;
      }

      // Rebuild order for new siblings
      newSiblings.splice(newOrder, 0, task);
      for (var i = 0; i < newSiblings.length; i++) {
        newSiblings[i].order = i;
      }

      this._save();
      return true;
    },

    getMilestonesByTask: function(taskId) {
      return this.data.milestones
        .filter(function(m) { return m.taskId === taskId; })
        .sort(function(a, b) { return a.date.localeCompare(b.date); });
    },

    getAllMilestones: function() {
      return this.data.milestones.slice();
    },

    addMilestone: function(taskId, name, date, icon) {
      var task = this.getTask(taskId);
      if (task) {
        var range = this.getDateRange(task);
        if (range.startDate && range.endDate) {
          if (date < range.startDate || date > range.endDate) {
            alert('里程碑日期必须在任务的时间范围内');
            return null;
          }
        }
      }
      var milestone = {
        id: DataStore.uuid(), taskId: taskId, name: name.trim(), date: date, icon: icon || '◆'
      };
      this.data.milestones.push(milestone);
      this._save();
      return milestone;
    },

    updateMilestone: function(id, updates) {
      var milestone = this.data.milestones.find(function(m) { return m.id === id; });
      if (!milestone) return null;
      if (updates.name !== undefined) milestone.name = updates.name.trim();
      if (updates.date !== undefined) milestone.date = updates.date;
      if (updates.icon !== undefined) milestone.icon = updates.icon;
      this._save();
      return milestone;
    },

    deleteMilestone: function(id) {
      this.data.milestones = this.data.milestones.filter(function(m) { return m.id !== id; });
      this._save();
    },

    getSetting: function(key) {
      return this.data.settings[key];
    },

    setSetting: function(key, value) {
      this.data.settings[key] = value;
      this._save();
    },

    replaceData: function(newData) {
      this.data = newData;
      this._save();
    }
  };

  // ============================================================
  // == TreeView: 多层级任务树
  // ============================================================
  const TreeView = {
    container: null,
    contextMenu: null,
    collapsedTasks: new Set(),
    selectedTaskId: null,
    hoveredTaskId: null,

    init: function() {
      this.container = document.getElementById('tree-container');
      this.contextMenu = document.getElementById('context-menu');
      document.addEventListener('click', function() { TreeView.hideContextMenu(); });
    },

    render: function() {
      var roots = TaskManager.getRootTasks();
      if (roots.length === 0) {
        this.container.innerHTML = '<div style="padding:24px 16px;color:var(--color-text-light);font-size:13px;text-align:center;">暂无任务<br>点击下方按钮新建</div>';
        return;
      }
      var html = '';
      var self = this;
      roots.forEach(function(task) {
        html += self._renderNode(task, 0);
      });
      this.container.innerHTML = html;
      this._bindEvents();
    },

    _renderNode: function(task, depth) {
      var children = TaskManager.getChildren(task.id);
      var hasChildren = children.length > 0;
      var isCollapsed = this.collapsedTasks.has(task.id);
      var isSelected = this.selectedTaskId === task.id;
      var isHighlighted = this.hoveredTaskId === task.id;
      var color = TaskManager.getEffectiveColor(task);

      var statusIcon = task.status === 'done' ? '✓' : task.status === 'inProgress' ? '►' : '○';
      var statusColor = task.status === 'done' ? '#2ecc71' : task.status === 'inProgress' ? '#f39c12' : '#ccc';

      var rowCls = 'tree-node-row';
      if (isSelected) rowCls += ' selected';
      if (isHighlighted) rowCls += ' highlighted';

      var arrowCls = 'arrow';
      if (!hasChildren) arrowCls += ' empty';
      else if (isCollapsed) arrowCls += ' collapsed';

      var html = '<div class="tree-node" data-task-id="' + task.id + '" data-depth="' + depth + '">';
      html += '<div class="' + rowCls + '" data-task-id="' + task.id + '" draggable="true">';
      html += '<span class="' + arrowCls + '">▼</span>';
      html += '<span class="color-dot" style="background:' + color + '"></span>';
      html += '<span class="status-icon" style="color:' + statusColor + '">' + statusIcon + '</span>';
      html += '<span class="node-name">' + _escapeHtml(task.name) + '</span>';
      if (task.assignee) {
        html += '<span style="font-size:11px;color:var(--color-text-light);flex-shrink:0;margin-right:4px;">' + _escapeHtml(task.assignee) + '</span>';
      }
      html += '<span class="node-actions">';
      if (depth < 2) {
        html += '<button class="btn-add-child" data-task-id="' + task.id + '" title="添加子任务">+</button>';
      }
      html += '<button class="btn-more" data-task-id="' + task.id + '" title="更多操作">⋯</button>';
      html += '</span>';
      html += '</div>';

      if (hasChildren) {
        html += '<div class="tree-children' + (isCollapsed ? ' collapsed' : '') + '">';
        var self = this;
        children.forEach(function(child) {
          html += self._renderNode(child, depth + 1);
        });
        html += '</div>';
      }
      html += '</div>';
      return html;
    },

    _bindEvents: function() {
      var self = this;

      this.container.querySelectorAll('.tree-node-row').forEach(function(el) {
        var taskId = el.dataset.taskId;

        // Status icon click - cycle status
        var statusIcon = el.querySelector('.status-icon');
        if (statusIcon) {
          statusIcon.style.cursor = 'pointer';
          statusIcon.addEventListener('click', function(e) {
            e.stopPropagation();
            var task = TaskManager.getTask(taskId);
            if (!task) return;
            var newStatus = task.status === 'todo' ? 'inProgress' :
                            task.status === 'inProgress' ? 'done' : 'todo';
            TaskManager.updateTask(taskId, { status: newStatus });
            self.render();
            App.renderAll();
          });
        }

        el.addEventListener('click', function(e) {
          if (e.target.closest('.node-actions')) return;
          var children = TaskManager.getChildren(taskId);
          if (children.length > 0 && e.target.classList.contains('arrow')) {
            if (self.collapsedTasks.has(taskId)) {
              self.collapsedTasks.delete(taskId);
            } else {
              self.collapsedTasks.add(taskId);
            }
            self.render();
            return;
          }
          self.selectedTaskId = taskId;
          self.render();
          App.onTaskSelected(taskId);
        });

        el.addEventListener('mouseenter', function() {
          self.hoveredTaskId = taskId;
          App.onTaskHovered(taskId);
        });
        el.addEventListener('mouseleave', function() {
          self.hoveredTaskId = null;
          App.onTaskHovered(null);
        });

        el.addEventListener('contextmenu', function(e) {
          e.preventDefault();
          var depth = TaskManager.getDepth(taskId);
          var task = TaskManager.getTask(taskId);
          var items = [];
          if (depth < 2) {
            items.push({ label: '添加子任务', action: function() { App.showAddTask(taskId); } });
          }
          items.push({ label: '标记为待办', action: function() { TaskManager.updateTask(taskId, { status: 'todo' }); self.render(); App.renderAll(); } });
          items.push({ label: '标记为进行中', action: function() { TaskManager.updateTask(taskId, { status: 'inProgress' }); self.render(); App.renderAll(); } });
          items.push({ label: '标记为已完成', action: function() { TaskManager.updateTask(taskId, { status: 'done' }); self.render(); App.renderAll(); } });
          items.push({ label: '编辑任务', action: function() { App.showEditTask(taskId); } });
          items.push({ label: '设置颜色', action: function() { App.showColorPicker(taskId); } });
          items.push({ label: '删除任务', action: function() { App.deleteTask(taskId); }, danger: true });
          self.showContextMenu(e.clientX, e.clientY, items);
        });

        // Drag and drop events
        el.addEventListener('dragstart', function(e) {
          self._dragStart(e, taskId);
        });

        el.addEventListener('dragend', function(e) {
          self._dragEnd(e);
        });

        el.addEventListener('dragover', function(e) {
          self._dragOver(e, taskId);
        });

        el.addEventListener('dragleave', function(e) {
          self._dragLeave(e);
        });

        el.addEventListener('drop', function(e) {
          self._drop(e, taskId);
        });
      });

      this.container.querySelectorAll('.btn-add-child').forEach(function(btn) {
        btn.addEventListener('click', function(e) {
          e.stopPropagation();
          App.showAddTask(btn.dataset.taskId);
        });
      });

      this.container.querySelectorAll('.btn-more').forEach(function(btn) {
        btn.addEventListener('click', function(e) {
          e.stopPropagation();
          var taskId = btn.dataset.taskId;
          var depth = TaskManager.getDepth(taskId);
          var rect = btn.getBoundingClientRect();
          var items = [];
          if (depth < 2) {
            items.push({ label: '添加子任务', action: function() { App.showAddTask(taskId); } });
          }
          items.push({ label: '标记为待办', action: function() { TaskManager.updateTask(taskId, { status: 'todo' }); self.render(); App.renderAll(); } });
          items.push({ label: '标记为进行中', action: function() { TaskManager.updateTask(taskId, { status: 'inProgress' }); self.render(); App.renderAll(); } });
          items.push({ label: '标记为已完成', action: function() { TaskManager.updateTask(taskId, { status: 'done' }); self.render(); App.renderAll(); } });
          items.push({ label: '编辑任务', action: function() { App.showEditTask(taskId); } });
          items.push({ label: '设置颜色', action: function() { App.showColorPicker(taskId); } });
          items.push({ label: '删除任务', action: function() { App.deleteTask(taskId); }, danger: true });
          self.showContextMenu(rect.left, rect.bottom, items);
        });
      });
    },

    showContextMenu: function(x, y, items) {
      var self = this;
      var html = '';
      items.forEach(function(item) {
        var cls = item.danger ? ' danger' : '';
        html += '<div class="context-menu-item' + cls + '">' + item.label + '</div>';
      });
      this.contextMenu.innerHTML = html;
      this.contextMenu.style.left = x + 'px';
      this.contextMenu.style.top = y + 'px';
      this.contextMenu.classList.add('active');

      // Boundary detection - adjust if menu overflows viewport
      var rect = this.contextMenu.getBoundingClientRect();
      var pad = 4;
      if (rect.right > window.innerWidth - pad) {
        this.contextMenu.style.left = (x - rect.width) + 'px';
      }
      if (rect.bottom > window.innerHeight - pad) {
        this.contextMenu.style.top = (y - rect.height) + 'px';
      }

      this.contextMenu.querySelectorAll('.context-menu-item').forEach(function(el, i) {
        el.addEventListener('click', function(e) {
          e.stopPropagation();
          self.hideContextMenu();
          items[i].action();
        });
      });
    },

    hideContextMenu: function() {
      this.contextMenu.classList.remove('active');
    },

    highlightTask: function(taskId) {
      this.selectedTaskId = taskId;
      this.render();
      var el = this.container.querySelector('[data-task-id="' + taskId + '"].tree-node-row');
      if (el) el.scrollIntoView({ block: 'nearest' });
    },

    setHoverHighlight: function(taskId) {
      this.container.querySelectorAll('.tree-node-row.highlighted').forEach(function(el) {
        el.classList.remove('highlighted');
      });
      if (taskId) {
        var el = this.container.querySelector('.tree-node-row[data-task-id="' + taskId + '"]');
        if (el) el.classList.add('highlighted');
      }
    },

    // Drag and drop methods
    _dragStart: function(e, taskId) {
      this.draggedTaskId = taskId;
      e.dataTransfer.effectAllowed = 'move';
      e.dataTransfer.setData('text/plain', taskId);
      e.target.style.opacity = '0.5';
    },

    _dragEnd: function(e) {
      this.draggedTaskId = null;
      this._removeInsertLine();
      document.querySelectorAll('.tree-node-row').forEach(function(el) {
        el.style.opacity = '';
      });
    },

    _getDropPosition: function(e, targetTaskId) {
      var rect = e.currentTarget.getBoundingClientRect();
      var y = e.clientY - rect.top;
      var targetDepth = TaskManager.getDepth(targetTaskId);

      // Determine drop position: 'before', 'after', 'child'
      var arrowArea = e.target.classList.contains('arrow') || e.target.closest('.arrow');

      if (arrowArea && targetDepth < 2) {
        return 'child';
      } else if (y < rect.height * 0.3) {
        return 'before';
      } else if (y > rect.height * 0.7) {
        return 'after';
      } else {
        return 'child';
      }
    },

    _dragOver: function(e, targetTaskId) {
      e.preventDefault();
      if (this.draggedTaskId === targetTaskId) return;

      var position = this._getDropPosition(e, targetTaskId);
      var isValid = this._isValidDrop(this.draggedTaskId, targetTaskId, position);

      this._showInsertLine(e.currentTarget, position, isValid);
      e.dataTransfer.dropEffect = isValid ? 'move' : 'none';
    },

    _dragLeave: function(e) {
      this._removeInsertLine();
    },

    _drop: function(e, targetTaskId) {
      e.preventDefault();
      this._removeInsertLine();

      if (!this.draggedTaskId || this.draggedTaskId === targetTaskId) return;

      var position = this._getDropPosition(e, targetTaskId);

      if (!this._isValidDrop(this.draggedTaskId, targetTaskId, position)) {
        return;
      }

      // Calculate new parent and order
      var newParentId, newOrder;
      var targetTask = TaskManager.getTask(targetTaskId);

      if (position === 'child') {
        newParentId = targetTaskId;
        var siblings = TaskManager.getChildren(targetTaskId);
        newOrder = siblings.length;
      } else {
        newParentId = targetTask.parentId;
        var siblings = newParentId ? TaskManager.getChildren(newParentId) : TaskManager.getRootTasks();
        var targetIndex = siblings.findIndex(function(t) { return t.id === targetTaskId; });
        newOrder = position === 'before' ? targetIndex : targetIndex + 1;
      }

      if (TaskManager.moveTask(this.draggedTaskId, newParentId, newOrder)) {
        this.render();
        App.renderAll();
      }
    },

    _isValidDrop: function(draggedId, targetId, position) {
      // Cannot drop on self
      if (draggedId === targetId) return false;

      // Cannot drop into descendant
      var descendants = TaskManager.getDescendants(draggedId);
      for (var i = 0; i < descendants.length; i++) {
        if (descendants[i].id === targetId) return false;
      }

      // Calculate new depth
      var newDepth = 0;
      if (position === 'child') {
        newDepth = TaskManager.getDepth(targetId) + 1;
      } else {
        var targetTask = TaskManager.getTask(targetId);
        newDepth = targetTask ? TaskManager.getDepth(targetTask.parentId) + 1 : 0;
        if (targetTask && targetTask.parentId) {
          newDepth = TaskManager.getDepth(targetTask.parentId) + 1;
        } else {
          newDepth = 0;
        }
      }

      // Check if dragged task has descendants that would exceed limit
      if (descendants.length > 0) {
        var maxDescendantDepth = 0;
        for (var i = 0; i < descendants.length; i++) {
          var d = TaskManager.getDepth(descendants[i].id);
          if (d > maxDescendantDepth) maxDescendantDepth = d;
        }
        var draggedDepth = TaskManager.getDepth(draggedId);
        var relativeDescendantDepth = maxDescendantDepth - draggedDepth;
        if (newDepth + relativeDescendantDepth > 2) return false;
      }

      // Check depth limit for position
      if (position === 'child') {
        var targetDepth = TaskManager.getDepth(targetId);
        if (targetDepth >= 2) return false;
      }

      return true;
    },

    _showInsertLine: function(targetEl, position, isValid) {
      this._removeInsertLine();

      var line = document.createElement('div');
      line.className = 'tree-insert-line' + (isValid ? '' : ' invalid');
      line.style.position = 'absolute';
      line.style.left = '0';
      line.style.right = '0';
      line.style.height = '2px';
      line.style.background = isValid ? '#4a90d9' : '#e74c3c';
      line.style.zIndex = '100';
      line.style.pointerEvents = 'none';

      var rect = targetEl.getBoundingClientRect();
      var containerRect = this.container.getBoundingClientRect();

      if (position === 'before') {
        line.style.top = (rect.top - containerRect.top) + 'px';
      } else if (position === 'after') {
        line.style.top = (rect.bottom - containerRect.top) + 'px';
      } else {
        // 'child' - show border around the element
        line.style.top = (rect.top - containerRect.top) + 'px';
        line.style.height = rect.height + 'px';
        line.style.background = 'transparent';
        line.style.border = '2px dashed ' + (isValid ? '#4a90d9' : '#e74c3c');
        line.style.boxSizing = 'border-box';
      }

      this.container.appendChild(line);
      this._insertLine = line;
    },

    _removeInsertLine: function() {
      if (this._insertLine && this._insertLine.parentNode) {
        this._insertLine.parentNode.removeChild(this._insertLine);
      }
      this._insertLine = null;
    }
  };

  function _escapeHtml(str) {
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  // ============================================================
  // Parse YYYY-MM-DD as local time (not UTC)
  function _parseDate(str) {
    var parts = String(str).split('-');
    return new Date(parseInt(parts[0]), parseInt(parts[1]) - 1, parseInt(parts[2]));
  }

  // == GanttView: 甘特图渲染、时间轴计算、粒度切换
  // ============================================================
  const GanttView = {
    container: null,
    granularity: 'month',
    cellWidth: 80,
    startDate: null,
    endDate: null,
    cells: [],

    init: function(container) {
      this.container = container;
    },

    setGranularity: function(g) {
      this.granularity = g;
      this.render();
    },

    _calcDateRange: function() {
      var allTasks = TaskManager.getAllTasks();
      var milestones = TaskManager.getAllMilestones();
      var allDates = [];

      var self = this;
      allTasks.forEach(function(t) {
        var range = TaskManager.getDateRange(t);
        if (range.startDate) allDates.push(range.startDate);
        if (range.endDate) allDates.push(range.endDate);
      });
      milestones.forEach(function(m) { allDates.push(m.date); });

      if (allDates.length === 0) {
        var now = new Date();
        this.startDate = new Date(now.getFullYear(), now.getMonth(), 1);
        this.endDate = new Date(now.getFullYear(), now.getMonth() + 2, 0);
        return;
      }

      allDates.sort();
      var minDate = _parseDate(allDates[0]);
      var maxDate = _parseDate(allDates[allDates.length - 1]);

      var pad = this.granularity === 'year' ? 30 : this.granularity === 'month' ? 14 : 7;
      this.startDate = new Date(minDate);
      this.startDate.setDate(this.startDate.getDate() - pad);
      this.endDate = new Date(maxDate);
      this.endDate.setDate(this.endDate.getDate() + pad);

      if (this.granularity === 'year') {
        this.startDate.setDate(1);
      } else if (this.granularity === 'month') {
        var day = this.startDate.getDay();
        this.startDate.setDate(this.startDate.getDate() - ((day + 6) % 7));
      }
    },

    _generateCells: function() {
      this.cells = [];
      var d = new Date(this.startDate);

      if (this.granularity === 'year') {
        this.cellWidth = 80;
        d.setDate(1);
        while (d <= this.endDate) {
          var label = d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0');
          var start = new Date(d);
          d.setMonth(d.getMonth() + 1);
          var end = new Date(d);
          end.setDate(end.getDate() - 1);
          this.cells.push({ label: label, start: start, end: end, days: this._daysBetween(start, end) + 1 });
        }
      } else if (this.granularity === 'month') {
        this.cellWidth = 80;
        var day = d.getDay();
        d.setDate(d.getDate() - ((day + 6) % 7));
        while (d <= this.endDate) {
          var start = new Date(d);
          d.setDate(d.getDate() + 7);
          var end = new Date(d);
          end.setDate(end.getDate() - 1);
          var weekNum = this._getWeekNumber(start);
          this.cells.push({ label: 'W' + weekNum, start: start, end: end, days: 7 });
        }
      } else {
        this.cellWidth = 40;
        var weekdays = ['周一', '周二', '周三', '周四', '周五', '周六', '周日'];
        while (d <= this.endDate) {
          var start = new Date(d);
          var dayOfWeek = d.getDay();
          var weekdayLabel = weekdays[(dayOfWeek + 6) % 7];
          var label = (d.getMonth() + 1) + '/' + d.getDate();
          this.cells.push({ label: label, weekday: weekdayLabel, start: start, end: new Date(d), days: 1, isWeekend: dayOfWeek === 0 || dayOfWeek === 6 });
          d.setDate(d.getDate() + 1);
        }
      }
    },

    _dateToX: function(dateStr) {
      // 统一基准：基于 cells 进行精确比例映射
      if (this.cells.length === 0) return 0;
      var targetTime = _parseDate(dateStr).getTime();

      for (var i = 0; i < this.cells.length; i++) {
        var cellStartTime = this.cells[i].start.getTime();
        // 单元格的结束边界是下一天的凌晨 00:00:00
        var cellEndTime = this.cells[i].end.getTime() + 86400000;

        if (targetTime >= cellStartTime && targetTime < cellEndTime) {
          // 精确计算在这个单元格内的百分比进度
          var ratio = (targetTime - cellStartTime) / (cellEndTime - cellStartTime);
          return (i + ratio) * this.cellWidth;
        }
      }

      // 越界保护（Fallback）：基于第一个或最后一个单元格做线性外推
      var firstCellTime = this.cells[0].start.getTime();
      if (targetTime < firstCellTime) {
        var diff = firstCellTime - targetTime;
        var duration = this.cells[0].end.getTime() + 86400000 - firstCellTime;
        return -(diff / duration) * this.cellWidth;
      } else {
        var lastCell = this.cells[this.cells.length - 1];
        var lastCellTime = lastCell.end.getTime() + 86400000;
        var diff = targetTime - lastCellTime;
        var duration = lastCellTime - lastCell.start.getTime();
        return (this.cells.length + (diff / duration)) * this.cellWidth;
      }
    },

    _xToDate: function(x) {
      // 统一基准：基于 cells 进行精确比例映射
      if (this.cells.length === 0) return DataStore.formatDate(new Date());

      var preciseIndex = x / this.cellWidth;
      var cellIndex = Math.floor(preciseIndex);

      // 限制索引在有效格子范围内
      if (cellIndex < 0) cellIndex = 0;
      if (cellIndex >= this.cells.length) cellIndex = this.cells.length - 1;

      var ratio = Math.max(0, Math.min(1, preciseIndex - cellIndex));

      var cell = this.cells[cellIndex];
      var cellStartTime = cell.start.getTime();
      var cellEndTime = cell.end.getTime() + 86400000;

      // 根据比例映射回具体的时间戳
      var targetTime = cellStartTime + ratio * (cellEndTime - cellStartTime);
      return DataStore.formatDate(new Date(targetTime));
    },

    _daysBetween: function(d1, d2) {
      var t1 = new Date(d1).setHours(0, 0, 0, 0);
      var t2 = new Date(d2).setHours(0, 0, 0, 0);
      return Math.round((t2 - t1) / 86400000);
    },

    _getWeekNumber: function(d) {
      var date = new Date(d);
      date.setHours(0, 0, 0, 0);
      date.setDate(date.getDate() + 3 - (date.getDay() + 6) % 7);
      var week1 = new Date(date.getFullYear(), 0, 4);
      return 1 + Math.round(((date - week1) / 86400000 - 3 + (week1.getDay() + 6) % 7) / 7);
    },

    _buildRows: function(leafTasks) {
      // Build rows based on tree order (DFS traversal)
      // Each leaf task gets its own row
      var rows = [];
      leafTasks.forEach(function(task) {
        rows.push([task]);
      });
      return rows;
    },

    _getLeafTasksInTreeOrder: function() {
      // Get leaf tasks in DFS tree order
      var result = [];
      var self = this;

      function traverse(taskId) {
        var children = TaskManager.getChildren(taskId);
        if (children.length === 0) {
          var task = TaskManager.getTask(taskId);
          if (task) result.push(task);
        } else {
          children.forEach(function(child) {
            traverse(child.id);
          });
        }
      }

      var roots = TaskManager.getRootTasks();
      roots.forEach(function(root) {
        traverse(root.id);
      });

      return result;
    },

    render: function() {
      this._calcDateRange();
      this._generateCells();

      // Get leaf tasks in tree order (DFS traversal)
      var leafTasks = this._getLeafTasksInTreeOrder();

      if (leafTasks.length === 0) {
        this.container.innerHTML = '<div class="gantt-empty">暂无任务，请先创建任务</div>';
        return;
      }

      var totalWidth = this.cells.length * this.cellWidth;
      var today = DataStore.formatDate(new Date());
      var self = this;

      // header 需要一个外层包装容器来控制 overflow
      var headerHtml = '<div class="gantt-header-wrapper"><div class="gantt-header" style="width:' + totalWidth + 'px;">';
      this.cells.forEach(function(cell) {
        var cls = 'gantt-header-cell';
        if (cell.isWeekend) cls += ' weekend';
        var weekdayHtml = cell.weekday ? '<div class="weekday">' + cell.weekday + '</div>' : '';
        headerHtml += '<div class="' + cls + '" style="width:' + self.cellWidth + 'px;">' + weekdayHtml + '<div>' + cell.label + '</div></div>';
      });
      headerHtml += '</div></div>';

      var rows = this._buildRows(leafTasks);
      var bodyHtml = '<div class="gantt-body"><div style="position:relative;width:' + totalWidth + 'px;min-height:' + (rows.length * 36) + 'px;">';

      var todayX = this._dateToX(today);
      if (todayX >= 0 && todayX <= totalWidth) {
        bodyHtml += '<div class="gantt-today-line" style="left:' + todayX + 'px;"></div>';
      }

      rows.forEach(function(row, rowIndex) {
        bodyHtml += '<div class="gantt-row" style="width:' + totalWidth + 'px;top:' + (rowIndex * 36) + 'px;position:absolute;left:0;" data-row-index="' + rowIndex + '">';
        self.cells.forEach(function(cell) {
          var cls = cell.isWeekend ? ' weekend' : '';
          bodyHtml += '<div class="gantt-grid-cell' + cls + '" style="width:' + self.cellWidth + 'px;"></div>';
        });
        bodyHtml += '</div>';

        row.forEach(function(task) {
          var range = TaskManager.getDateRange(task);
          if (!range.startDate || !range.endDate) return;

          var color = TaskManager.getEffectiveColor(task);

          // 精确左边缘（统一基准法）
          var barX = self._dateToX(range.startDate);
          // endDate 是包含当天的，为了拿到右边缘坐标，计算 endDate + 1 天的坐标
          var nextDayTime = _parseDate(range.endDate).getTime() + 86400000;
          var endX = self._dateToX(DataStore.formatDate(new Date(nextDayTime)));
          // 最小宽度限制为 20px 保证可视性
          var barW = Math.max(endX - barX, 20);

          var statusCls = task.status === 'done' ? ' status-done' : '';
          var selectedCls = (TreeView.selectedTaskId === task.id) ? ' selected' : '';
          var assigneeText = task.assignee ? ' [' + _escapeHtml(task.assignee) + ']' : '';

          // 格式化短日期（MM-DD）用于任务条显示
          var shortStartDate = range.startDate.slice(5);  // 去掉年份
          var shortEndDate = range.endDate.slice(5);
          var barLabel = _escapeHtml(task.name) + ' <span class="gantt-bar-dates">(' + shortStartDate + ' ~ ' + shortEndDate + ')</span>';

          bodyHtml += '<div class="gantt-bar' + statusCls + selectedCls + '" style="left:' + barX + 'px;width:' + barW + 'px;top:' + (rowIndex * 36 + 8) + 'px;background:' + color + ';" data-task-id="' + task.id + '" title="' + _escapeHtml(task.name) + assigneeText + ' (' + range.startDate + ' ~ ' + range.endDate + ')">' + barLabel + '</div>';

          var milestones = TaskManager.getMilestonesByTask(task.id);
          milestones.forEach(function(ms) {
            // 里程碑放在单元格中间位置
            var msX = self._dateToX(ms.date) + self.cellWidth / 2;
            bodyHtml += '<div class="gantt-milestone" style="left:' + msX + 'px;top:' + (rowIndex * 36 + 4) + 'px;" data-milestone-id="' + ms.id + '" data-task-id="' + task.id + '" title="' + _escapeHtml(ms.name) + ' (' + ms.date + ')">' + ms.icon + '</div>';
          });
        });
      });

      bodyHtml += '</div></div>';

      this.container.innerHTML = '<div class="gantt-container">' + headerHtml + bodyHtml + '</div>';
      this._bindBarEvents();
      this._setupScrollSync();
      this._setupColumnHighlight();

      var ganttBody = this.container.querySelector('.gantt-body');
      if (ganttBody && todayX > 0) {
        ganttBody.scrollLeft = Math.max(0, todayX - ganttBody.clientWidth / 2);
        // 初始同步（scroll 事件会自动触发 _scrollSyncHandler）
      }
    },

    _setupScrollSync: function() {
      var ganttBody = this.container.querySelector('.gantt-body');
      var ganttHeader = this.container.querySelector('.gantt-header');
      if (!ganttBody || !ganttHeader) return;

      // Remove existing listener if any
      if (this._scrollSyncHandler) {
        ganttBody.removeEventListener('scroll', this._scrollSyncHandler);
      }

      this._scrollSyncHandler = function() {
        // 使用 transform 移动 header 内容，因为 header 有 overflow:hidden 且 width=totalWidth
        ganttHeader.style.transform = 'translateX(' + (-ganttBody.scrollLeft) + 'px)';
      };
      ganttBody.addEventListener('scroll', this._scrollSyncHandler);
    },

    _setupColumnHighlight: function() {
      var self = this;
      var ganttBody = this.container.querySelector('.gantt-body');
      var ganttHeader = this.container.querySelector('.gantt-header');
      if (!ganttBody || !ganttHeader) return;

      // Remove existing highlights and listeners
      var existingHighlight = ganttBody.querySelector('.gantt-column-highlight');
      if (existingHighlight) existingHighlight.remove();
      var existingHeaderHighlight = ganttHeader.querySelector('.gantt-header-highlight');
      if (existingHeaderHighlight) existingHeaderHighlight.remove();

      if (this._columnHighlightHandlers) {
        ganttBody.removeEventListener('mousemove', this._columnHighlightHandlers.mousemove);
        ganttBody.removeEventListener('mouseleave', this._columnHighlightHandlers.mouseleave);
      }

      // Create column highlight overlay
      var highlightCol = document.createElement('div');
      highlightCol.className = 'gantt-column-highlight';
      highlightCol.style.cssText = 'position:absolute;top:0;bottom:0;width:' + this.cellWidth + 'px;background:rgba(74,144,217,0.08);pointer-events:none;display:none;z-index:1;';
      ganttBody.appendChild(highlightCol);

      // Create header column highlight
      var headerHighlight = document.createElement('div');
      headerHighlight.className = 'gantt-header-highlight';
      headerHighlight.style.cssText = 'position:absolute;top:0;bottom:0;width:' + this.cellWidth + 'px;background:rgba(74,144,217,0.12);pointer-events:none;display:none;z-index:1;';
      ganttHeader.style.position = 'relative';
      ganttHeader.appendChild(headerHighlight);

      var mousemoveHandler = function(e) {
        var rect = ganttBody.getBoundingClientRect();
        var x = e.clientX - rect.left + ganttBody.scrollLeft;
        var colIndex = Math.floor(x / self.cellWidth);

        highlightCol.style.left = (colIndex * self.cellWidth) + 'px';
        highlightCol.style.display = 'block';

        headerHighlight.style.left = (colIndex * self.cellWidth) + 'px';
        headerHighlight.style.display = 'block';
      };

      var mouseleaveHandler = function() {
        highlightCol.style.display = 'none';
        headerHighlight.style.display = 'none';
      };

      ganttBody.addEventListener('mousemove', mousemoveHandler);
      ganttBody.addEventListener('mouseleave', mouseleaveHandler);

      // Store handlers for cleanup
      this._columnHighlightHandlers = {
        mousemove: mousemoveHandler,
        mouseleave: mouseleaveHandler
      };
    },

    _bindBarEvents: function() {
      var self = this;

      this.container.querySelectorAll('.gantt-bar').forEach(function(el) {
        el.addEventListener('mouseenter', function() {
          TreeView.setHoverHighlight(el.dataset.taskId);
        });
        el.addEventListener('mouseleave', function() {
          TreeView.setHoverHighlight(null);
        });
        el.addEventListener('click', function(e) {
          if (e.detail === 1) {
            App.onGanttTaskClicked(el.dataset.taskId);
          }
        });
        el.addEventListener('dblclick', function(e) {
          App.showEditTask(el.dataset.taskId);
        });
        el.addEventListener('contextmenu', function(e) {
          e.preventDefault();
          e.stopPropagation();
          var taskId = el.dataset.taskId;
          var ganttBody = self.container.querySelector('.gantt-body');
          var rect = ganttBody.getBoundingClientRect();
          var clickX = e.clientX - rect.left + ganttBody.scrollLeft;
          var dateAtClick = self._xToDate(clickX);
          TreeView.showContextMenu(e.clientX, e.clientY, [
            { label: '添加里程碑', action: function() { App.showAddMilestoneAtDate(taskId, dateAtClick); } }
          ]);
        });
      });

      this.container.querySelectorAll('.gantt-milestone').forEach(function(el) {
        el.addEventListener('click', function(e) {
          e.stopPropagation();
          App.showEditMilestone(el.dataset.milestoneId);
        });
        el.addEventListener('contextmenu', function(e) {
          e.preventDefault();
          e.stopPropagation();
          TreeView.showContextMenu(e.clientX, e.clientY, [
            { label: '编辑里程碑', action: function() { App.showEditMilestone(el.dataset.milestoneId); } },
            { label: '删除里程碑', action: function() { App.deleteMilestone(el.dataset.milestoneId); }, danger: true }
          ]);
        });
      });

      DragManager.attachDragHandlers();
    },

    highlightBar: function(taskId) {
      this.container.querySelectorAll('.gantt-bar').forEach(function(el) {
        el.classList.toggle('highlight', el.dataset.taskId === taskId);
      });
    },

    clearHighlight: function() {
      this.container.querySelectorAll('.gantt-bar.highlight').forEach(function(el) {
        el.classList.remove('highlight');
      });
    },

    selectBar: function(taskId) {
      this.container.querySelectorAll('.gantt-bar.selected').forEach(function(el) {
        el.classList.remove('selected');
      });
      if (taskId) {
        var el = this.container.querySelector('.gantt-bar[data-task-id="' + taskId + '"]');
        if (el) {
          el.classList.add('selected');
          el.scrollIntoView({ block: 'nearest', inline: 'nearest' });
        }
