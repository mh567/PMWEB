  };

  // ============================================================
  // == DragManager: 甘特图拖拽操作
  // ============================================================
  var DragManager = {
    isDragging: false,
    dragType: null,
    dragTarget: null,
    dragElement: null,
    startX: 0,
    startY: 0,
    originalStartDate: null,
    originalEndDate: null,
    originalDate: null,
    tooltip: null,

    init: function() {
      var self = this;
      document.addEventListener('mousemove', function(e) { self._onMouseMove(e); });
      document.addEventListener('mouseup', function(e) { self._onMouseUp(e); });
      document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape' && (self.isDragging || self._pendingDrag)) {
          self._cancelDrag();
        }
      });
      document.addEventListener('mouseleave', function(e) {
        if (!e.relatedTarget && (self.isDragging || self._pendingDrag)) {
          self._cancelDrag();
        }
      });
    },

    attachDragHandlers: function() {
      var self = this;

      document.querySelectorAll('.gantt-bar').forEach(function(el) {
        el.addEventListener('mousedown', function(e) {
          if (e.button !== 0) return;
          e.preventDefault();
          var taskId = el.dataset.taskId;
          var task = TaskManager.getTask(taskId);
          if (!task) return;

          var rect = el.getBoundingClientRect();
          var offsetX = e.clientX - rect.left;
          var barWidth = rect.width;

          if (offsetX < 4) {
            self._startDrag(e, 'resize-left', task, el);
          } else if (offsetX > barWidth - 4) {
            self._startDrag(e, 'resize-right', task, el);
          } else {
            self._startDrag(e, 'move', task, el);
          }
        });

        el.addEventListener('mousemove', function(e) {
          if (self.isDragging || self._pendingDrag) return;
          var rect = el.getBoundingClientRect();
          var offsetX = e.clientX - rect.left;
          if (offsetX < 4 || offsetX > rect.width - 4) {
            el.style.cursor = 'col-resize';
          } else {
            el.style.cursor = 'grab';
          }
        });
      });

      document.querySelectorAll('.gantt-milestone').forEach(function(el) {
        el.addEventListener('mousedown', function(e) {
          if (e.button !== 0) return;
          e.preventDefault();
          e.stopPropagation();
          var msId = el.dataset.milestoneId;
          var ms = TaskManager.data.milestones.find(function(m) { return m.id === msId; });
          if (ms) {
            self._startDrag(e, 'milestone', ms, el);
          }
        });
      });
    },

    _startDrag: function(e, type, target, element) {
      // Don't immediately start drag — wait for threshold
      this._pendingDrag = {
        type: type,
        target: target,
        element: element,
        startX: e.clientX,
        startY: e.clientY
      };

      if (type === 'move' || type === 'resize-left' || type === 'resize-right') {
        this._pendingDrag.originalStartDate = target.startDate;
        this._pendingDrag.originalEndDate = target.endDate;
      } else if (type === 'milestone') {
        this._pendingDrag.originalDate = target.date;
      }

      document.body.style.userSelect = 'none';
    },

    _activateDrag: function(pending) {
      this.isDragging = true;
      this.dragType = pending.type;
      this.dragTarget = pending.target;
      this.dragElement = pending.element;
      this.startX = pending.startX;
      this.startY = pending.startY;
      this._rowMergeMode = false;
      this._targetRowIndex = -1;

      if (pending.type === 'move' || pending.type === 'resize-left' || pending.type === 'resize-right') {
        this.originalStartDate = pending.originalStartDate;
        this.originalEndDate = pending.originalEndDate;
      } else if (pending.type === 'milestone') {
        this.originalDate = pending.originalDate;
      }

      // Create tooltip
      this.tooltip = document.createElement('div');
      this.tooltip.className = 'gantt-drag-tooltip';
      document.body.appendChild(this.tooltip);

      // Create ghost element
      this._createGhost(pending.element, pending.type);

      // Dim original element
      pending.element.style.opacity = '0.3';

      document.body.style.cursor = (pending.type === 'move' || pending.type === 'milestone') ? 'grabbing' : 'col-resize';
    },

    _createGhost: function(element, type) {
      var rect = element.getBoundingClientRect();
      var ghost = document.createElement('div');
      ghost.className = 'drag-ghost';

      var bgColor = element.style.background || getComputedStyle(element).backgroundColor;

      if (type === 'milestone') {
        ghost.innerHTML = '<span class="drag-ghost-milestone">' + _escapeHtml(element.textContent) + '</span>';
        ghost.style.width = rect.width + 'px';
        ghost.style.height = rect.height + 'px';
        ghost.style.left = rect.left + 'px';
        ghost.style.top = rect.top + 'px';
        this._ghostOffsetX = this.startX - rect.left;
        this._ghostOffsetY = this.startY - rect.top;
      } else if (type === 'move') {
        ghost.innerHTML = '<div class="drag-ghost-bar" style="background:' + bgColor + ';width:' + rect.width + 'px;">' + _escapeHtml(element.textContent) + '</div>';
        ghost.style.left = rect.left + 'px';
        ghost.style.top = rect.top + 'px';
        this._ghostOffsetX = this.startX - rect.left;
        this._ghostOffsetY = this.startY - rect.top;
      } else {
        // resize-left or resize-right: ghost stays fixed, only width changes
        ghost.innerHTML = '<div class="drag-ghost-bar" style="background:' + bgColor + ';width:' + rect.width + 'px;">' + _escapeHtml(element.textContent) + '</div>';
        ghost.style.left = rect.left + 'px';
        ghost.style.top = rect.top + 'px';
        ghost.style.width = rect.width + 'px';
        ghost.style.height = rect.height + 'px';
        this._ghostFixedLeft = rect.left;
        this._ghostOriginalWidth = rect.width;
        // No offset for resize - ghost stays in place
        this._ghostOffsetX = 0;
        this._ghostOffsetY = 0;
      }

      document.body.appendChild(ghost);

      this._ghost = ghost;
    },

    _updateSnapLine: function(x) {
      // Remove existing snap line
      if (this._snapLine && this._snapLine.parentNode) {
        this._snapLine.parentNode.removeChild(this._snapLine);
      }

      if (x <= 0) return;

      var ganttBody = document.querySelector('.gantt-body');
      if (!ganttBody) return;

      var line = document.createElement('div');
      line.className = 'snap-line';
      line.style.left = x + 'px';

      var rowContainer = ganttBody.firstElementChild;
      if (rowContainer) {
        rowContainer.appendChild(line);
        this._snapLine = line;
      }
    },

    _onMouseMove: function(e) {
      // Phase 1: threshold check
      if (this._pendingDrag && !this.isDragging) {
        var dx = e.clientX - this._pendingDrag.startX;
        var dy = e.clientY - this._pendingDrag.startY;
        if (Math.abs(dx) < 4 && Math.abs(dy) < 4) return;
        // Threshold exceeded — activate drag
        this._activateDrag(this._pendingDrag);
        this._pendingDrag = null;
      }

      if (!this.isDragging) return;

      var deltaX = e.clientX - this.startX;
      var deltaY = e.clientY - this.startY;

      // Calculate pixel delta directly (ghost follows mouse precisely)
      var pixelDelta = deltaX;

      // Update ghost position/width
      if (this._ghost) {
        if (this.dragType === 'milestone') {
          // Milestone: horizontal only
          this._ghost.style.left = (e.clientX - this._ghostOffsetX) + 'px';
        } else if (this.dragType === 'move') {
          // Move: entire bar follows mouse
          this._ghost.style.left = (e.clientX - this._ghostOffsetX) + 'px';
          this._ghost.style.top = (e.clientY - this._ghostOffsetY) + 'px';
        } else if (this.dragType === 'resize-left') {
          // Resize left: left edge follows mouse, right edge stays fixed
          var newWidth = this._ghostOriginalWidth - pixelDelta;
          if (newWidth >= 20) {
            this._ghost.style.left = (this._ghostFixedLeft + pixelDelta) + 'px';
            this._ghost.style.width = newWidth + 'px';
            var bar = this._ghost.querySelector('.drag-ghost-bar');
            if (bar) bar.style.width = newWidth + 'px';
            this._ghostValid = true;
          } else {
            this._ghostValid = false;
          }
        } else if (this.dragType === 'resize-right') {
          // Resize right: right edge follows mouse, left edge stays fixed
          var newWidth = this._ghostOriginalWidth + pixelDelta;
          if (newWidth >= 20) {
            this._ghost.style.width = newWidth + 'px';
            var bar = this._ghost.querySelector('.drag-ghost-bar');
            if (bar) bar.style.width = newWidth + 'px';
            this._ghostValid = true;
          } else {
            this._ghostValid = false;
          }
        }
      }

      // ===== 统一基准法：直接根据绝对坐标反推日期 =====
      var self = this;

      // 辅助函数：ghost屏幕坐标转gantt内部坐标（仅用于snap line）
      var ghostToGanttX = function(ghostX) {
        var ganttBody = document.querySelector('.gantt-body');
        if (!ganttBody) return 0;
        var ganttRect = ganttBody.getBoundingClientRect();
        return ghostX - ganttRect.left + ganttBody.scrollLeft;
      };

      // 辅助函数：日期加一天
      var addOneDay = function(dateStr) {
        var t = _parseDate(dateStr).getTime() + 86400000;
        return DataStore.formatDate(new Date(t));
      };

      // 辅助函数：日期减一天
      var subOneDay = function(dateStr) {
        var t = _parseDate(dateStr).getTime() - 86400000;
        return DataStore.formatDate(new Date(t));
      };

      if (this.dragType === 'move') {
        // Detect vertical drag intent for row merge
        if (Math.abs(deltaY) > 18) {
          this._rowMergeMode = true;
          var barTop = parseFloat(this.dragElement.style.top);
          var targetRowIndex = Math.max(0, Math.round((barTop + deltaY) / 36));
          this._targetRowIndex = targetRowIndex;

          // Highlight target row
          document.querySelectorAll('.gantt-row').forEach(function(row) {
            row.style.background = '';
          });
          var targetRow = document.querySelector('.gantt-row[data-row-index="' + targetRowIndex + '"]');
          if (targetRow) {
            targetRow.style.background = 'rgba(74, 144, 217, 0.1)';
          }
          this.tooltip.textContent = '排序到第 ' + (targetRowIndex + 1) + ' 行';
        } else {
          this._rowMergeMode = false;
          // Clear row highlights
          document.querySelectorAll('.gantt-row').forEach(function(row) {
            row.style.background = '';
          });

          // 核心变化：基于原绝对坐标 + 偏移量计算新日期
          var originalStartX = GanttView._dateToX(this.originalStartDate);
          var originalEndX = GanttView._dateToX(addOneDay(this.originalEndDate));

          var newStart = GanttView._xToDate(originalStartX + deltaX);
          var newEndNextDay = GanttView._xToDate(originalEndX + deltaX);
          var newEnd = subOneDay(newEndNextDay); // 把专属排他边界转回包含边界

          this.tooltip.textContent = newStart + ' ~ ' + newEnd;
          this.dragTarget._tempStart = newStart;
          this.dragTarget._tempEnd = newEnd;

          // Update snap line based on ghost position
          if (this._ghostValid !== false) {
            var ghostLeft = parseFloat(this._ghost.style.left);
            this._updateSnapLine(ghostToGanttX(ghostLeft));
          }
        }
      } else if (this.dragType === 'resize-left') {
        var originalStartX = GanttView._dateToX(this.originalStartDate);
        var displayStart = GanttView._xToDate(originalStartX + deltaX);

        // 不允许开始日期 >= 结束日期
        if (displayStart >= this.originalEndDate) {
          displayStart = subOneDay(this.originalEndDate);
        }
        this.tooltip.textContent = '开始: ' + this.originalStartDate + ' → ' + displayStart;
        this.dragTarget._tempStart = displayStart;

        // Snap line at ghost left edge
        if (this._ghostValid) {
          var ghostLeft = parseFloat(this._ghost.style.left);
          this._updateSnapLine(ghostToGanttX(ghostLeft));
        }
      } else if (this.dragType === 'resize-right') {
        var originalEndX = GanttView._dateToX(addOneDay(this.originalEndDate));
        var newEndNextDay = GanttView._xToDate(originalEndX + deltaX);
        var displayEnd = subOneDay(newEndNextDay);

        // 不允许结束日期 <= 开始日期
        if (displayEnd <= this.originalStartDate) {
          displayEnd = addOneDay(this.originalStartDate);
        }
        this.tooltip.textContent = '结束: ' + this.originalEndDate + ' → ' + displayEnd;
        this.dragTarget._tempEnd = displayEnd;

        // Snap line at ghost right edge
        if (this._ghostValid) {
          var ghostRight = parseFloat(this._ghost.style.left) + parseFloat(this._ghost.style.width);
          this._updateSnapLine(ghostToGanttX(ghostRight));
        }
      } else if (this.dragType === 'milestone') {
        // 里程碑拖拽：直接用 deltaX 计算新日期
        var originalX = GanttView._dateToX(this.originalDate);
        var newDate = GanttView._xToDate(originalX + deltaX);

        this.tooltip.textContent = newDate;
        this.dragTarget._tempDate = newDate;

        // Snap line at ghost center (milestone is 20px wide, centered)
        var ghostCenter = parseFloat(this._ghost.style.left) + 10;
        this._updateSnapLine(ghostToGanttX(ghostCenter));
      }

      this.tooltip.style.left = (e.clientX + 12) + 'px';
      this.tooltip.style.top = (e.clientY - 30) + 'px';
    },

    _onMouseUp: function(e) {
      // Handle case where mouse was released before threshold
      if (this._pendingDrag) {
        this._pendingDrag = null;
        document.body.style.userSelect = '';
        return;
      }
      if (!this.isDragging) return;

      var target = this.dragTarget;

      // Clear row highlights
      document.querySelectorAll('.gantt-row').forEach(function(row) {
        row.style.background = '';
      });

      if (this.dragType === 'move') {
        if (this._rowMergeMode && this._targetRowIndex >= 0) {
          // Row reorder logic
          this._handleRowReorder(target, this._targetRowIndex);
        } else if (target._tempStart && target._tempEnd) {
          TaskManager.updateTask(target.id, { startDate: target._tempStart, endDate: target._tempEnd });
        }
      } else if (this.dragType === 'resize-left') {
        if (target._tempStart) {
          TaskManager.updateTask(target.id, { startDate: target._tempStart });
        }
      } else if (this.dragType === 'resize-right') {
        if (target._tempEnd) {
          TaskManager.updateTask(target.id, { endDate: target._tempEnd });
        }
      } else if (this.dragType === 'milestone') {
        if (target._tempDate) {
          var task = TaskManager.getTask(target.taskId);
          if (task) {
            var range = TaskManager.getDateRange(task);
            if (range.startDate && range.endDate) {
              if (target._tempDate < range.startDate || target._tempDate > range.endDate) {
                this._cleanup();
                App.renderAll();
                return;
              }
            }
          }
          TaskManager.updateMilestone(target.id, { date: target._tempDate });
        }
      }

      delete target._tempStart;
      delete target._tempEnd;
      delete target._tempDate;

      this._cleanup();
      App.renderAll();
    },

    _cancelDrag: function() {
      if (this._pendingDrag) {
        this._pendingDrag = null;
        document.body.style.userSelect = '';
        return;
      }
      if (!this.isDragging) return;
      delete this.dragTarget._tempStart;
      delete this.dragTarget._tempEnd;
      delete this.dragTarget._tempDate;
      this._cleanup();
      App.renderAll();
    },

    _cleanup: function() {
      this.isDragging = false;
      this.dragType = null;
      this._pendingDrag = null;

      // Restore original element opacity
      if (this.dragElement) {
        this.dragElement.style.opacity = '';
      }
      this.dragElement = null;
      this.dragTarget = null;

      // Remove ghost
      if (this._ghost && this._ghost.parentNode) {
        document.body.removeChild(this._ghost);
      }
      this._ghost = null;
      this._ghostValid = null;

      // Remove snap line
      if (this._snapLine && this._snapLine.parentNode) {
        this._snapLine.parentNode.removeChild(this._snapLine);
      }
      this._snapLine = null;

      // Remove tooltip
      if (this.tooltip && this.tooltip.parentNode) {
        document.body.removeChild(this.tooltip);
      }
      this.tooltip = null;

      document.body.style.userSelect = '';
      document.body.style.cursor = '';
    },

    _handleRowReorder: function(task, targetRowIndex) {
      // Get leaf tasks in tree order
      var leafTasks = GanttView._getLeafTasksInTreeOrder();

      // Find current row of dragged task
      var currentRowIndex = -1;
      for (var i = 0; i < leafTasks.length; i++) {
        if (leafTasks[i].id === task.id) {
          currentRowIndex = i;
          break;
        }
      }

      if (currentRowIndex < 0 || targetRowIndex >= leafTasks.length) return;
      if (currentRowIndex === targetRowIndex) return;

      // Get target task
      var targetTask = leafTasks[targetRowIndex];
      if (!targetTask) return;

      // Determine if moving before or after
      var isMovingDown = targetRowIndex > currentRowIndex;

      // Calculate new parent and order
      // We'll move the task to be a sibling of the target task
      var newParentId = targetTask.parentId;
      var siblings = newParentId ? TaskManager.getChildren(newParentId) : TaskManager.getRootTasks();

      // Find target's index among siblings
      var targetSiblingIndex = -1;
      for (var i = 0; i < siblings.length; i++) {
        if (siblings[i].id === targetTask.id) {
          targetSiblingIndex = i;
          break;
        }
      }

      if (targetSiblingIndex < 0) return;

      // Calculate new order
      var newOrder;
      if (isMovingDown) {
        // Moving down: insert after target
        newOrder = targetSiblingIndex + 1;
      } else {
        // Moving up: insert before target
        newOrder = targetSiblingIndex;
      }

      // Use moveTask to reorder
      if (TaskManager.moveTask(task.id, newParentId, newOrder)) {
        // Success - renderAll will be called by _onMouseUp
      }
    },

    _daysPerCell: function() {
      if (GanttView.granularity === 'year') return 30;
      if (GanttView.granularity === 'month') return 7;
      return 1;
    },

    _addDays: function(dateStr, days) {
      var d = _parseDate(dateStr);
      d.setDate(d.getDate() + days);
      return DataStore.formatDate(d);
    }
  };

  // ============================================================
  // == CalendarView: 月历渲染
  // ============================================================
  var CalendarView = {
    container: null,
    currentYear: new Date().getFullYear(),
    currentMonth: new Date().getMonth(),

    init: function(container) {
      this.container = container;
    },

    render: function() {
      var year = this.currentYear;
      var month = this.currentMonth;
      var today = new Date();
      var todayStr = DataStore.formatDate(today);
      var self = this;

      var monthNames = ['1月', '2月', '3月', '4月', '5月', '6月', '7月', '8月', '9月', '10月', '11月', '12月'];
      var html = '<div class="calendar-container">';
      html += '<div class="calendar-nav">';
      html += '<button id="cal-prev-month">◀</button>';
      html += '<span class="month-label">' + year + '年 ' + monthNames[month] + '</span>';
      html += '<button id="cal-next-month">▶</button>';
      html += '</div>';

      html += '<div class="calendar-grid">';

      var weekdays = ['一', '二', '三', '四', '五', '六', '日'];
      weekdays.forEach(function(d) {
        html += '<div class="calendar-weekday">' + d + '</div>';
      });

      var firstDay = new Date(year, month, 1);
      var startDay = new Date(firstDay);
      var dayOfWeek = (firstDay.getDay() + 6) % 7;
      startDay.setDate(startDay.getDate() - dayOfWeek);

      var allTasks = TaskManager.getAllTasks();
      var leafTasks = allTasks.filter(function(t) {
        return TaskManager.getChildren(t.id).length === 0;
      });
      var allMilestones = TaskManager.getAllMilestones();

      for (var i = 0; i < 42; i++) {
        var date = new Date(startDay);
        date.setDate(date.getDate() + i);
        var dateStr = DataStore.formatDate(date);
        var isCurrentMonth = date.getMonth() === month;
        var isToday = dateStr === todayStr;

        var cls = 'calendar-day';
        if (!isCurrentMonth) cls += ' other-month';
        if (isToday) cls += ' today';

        html += '<div class="' + cls + '" data-date="' + dateStr + '">';
        html += '<div class="calendar-day-number">' + date.getDate() + '</div>';

        leafTasks.forEach(function(task) {
          var range = TaskManager.getDateRange(task);
          if (!range.startDate || !range.endDate) return;
          if (dateStr >= range.startDate && dateStr <= range.endDate) {
            var color = TaskManager.getEffectiveColor(task);
            var opacity = task.status === 'done' ? '0.5' : '1';
            var showName = dateStr === range.startDate || date.getDay() === 1;
            html += '<div class="calendar-task-bar" style="background:' + color + ';opacity:' + opacity + ';" data-task-id="' + task.id + '" title="' + _escapeHtml(task.name) + '">' + (showName ? _escapeHtml(task.name) : '&nbsp;') + '</div>';
          }
        });

        allMilestones.forEach(function(ms) {
          if (ms.date === dateStr) {
            html += '<div class="calendar-milestone-item" data-milestone-id="' + ms.id + '" title="' + _escapeHtml(ms.name) + '">' + ms.icon + ' ' + _escapeHtml(ms.name) + '</div>';
          }
        });

        html += '</div>';
      }

      html += '</div></div>';
      this.container.innerHTML = html;

      document.getElementById('cal-prev-month').addEventListener('click', function() {
        self.currentMonth--;
        if (self.currentMonth < 0) { self.currentMonth = 11; self.currentYear--; }
        self.render();
      });
      document.getElementById('cal-next-month').addEventListener('click', function() {
        self.currentMonth++;
        if (self.currentMonth > 11) { self.currentMonth = 0; self.currentYear++; }
        self.render();
      });

      this.container.querySelectorAll('.calendar-task-bar').forEach(function(el) {
        el.addEventListener('click', function(e) {
          e.stopPropagation();
          App.onGanttTaskClicked(el.dataset.taskId);
        });
        el.addEventListener('mouseenter', function() {
          el.classList.add('highlight');
          TreeView.setHoverHighlight(el.dataset.taskId);
        });
        el.addEventListener('mouseleave', function() {
          el.classList.remove('highlight');
          TreeView.setHoverHighlight(null);
        });
      });

      this.container.querySelectorAll('.calendar-milestone-item').forEach(function(el) {
        el.addEventListener('click', function(e) {
          e.stopPropagation();
          App.showEditMilestone(el.dataset.milestoneId);
        });
      });

      // Right-click on calendar day to add milestone
      this.container.querySelectorAll('.calendar-day').forEach(function(el) {
        el.addEventListener('contextmenu', function(e) {
          e.preventDefault();
          var dateStr = el.dataset.date;
          var leafTasks = TaskManager.getAllTasks().filter(function(t) {
            return TaskManager.getChildren(t.id).length === 0;
          });
          if (leafTasks.length === 0) return;
          var items = [];
          leafTasks.forEach(function(task) {
            var range = TaskManager.getDateRange(task);
            if (range.startDate && range.endDate && dateStr >= range.startDate && dateStr <= range.endDate) {
              items.push({
                label: '添加里程碑到「' + task.name.substring(0, 8) + '」',
                action: function() { App.showAddMilestoneAtDate(task.id, dateStr); }
              });
            }
          });
          if (items.length > 0) {
            TreeView.showContextMenu(e.clientX, e.clientY, items);
          }
        });
      });
    },

    highlightBar: function(taskId) {
      this.container.querySelectorAll('.calendar-task-bar').forEach(function(el) {
        el.classList.toggle('highlight', el.dataset.taskId === taskId);
      });
    },

    clearHighlight: function() {
      this.container.querySelectorAll('.calendar-task-bar.highlight').forEach(function(el) {
        el.classList.remove('highlight');
      });
    },

    selectBar: function(taskId) {
      this.container.querySelectorAll('.calendar-task-bar.selected').forEach(function(el) {
        el.classList.remove('selected');
      });
      if (taskId) {
        this.container.querySelectorAll('.calendar-task-bar[data-task-id="' + taskId + '"]').forEach(function(el) {
          el.classList.add('selected');
        });
      }
    }
  };

  // ============================================================
  // == App: 初始化、事件绑定、视图切换
  // ============================================================
  var App = {
    currentView: 'gantt',

    init: function() {
      TaskManager.init();
      ModalManager.init();
      TreeView.init();
      GanttView.init(document.getElementById('content-area'));
      CalendarView.init(document.getElementById('content-area'));
      DragManager.init();
      this._setupSidebarResize();

      this.currentView = TaskManager.getSetting('lastView') || 'gantt';
      var granularity = TaskManager.getSetting('lastGranularity') || 'month';
      GanttView.granularity = granularity;

      this._bindToolbar();
      this._updateViewButtons();
      this._updateGranularityButtons();
      this.renderAll();
    },

    _setupSidebarResize: function() {
      var sidebar = document.getElementById('sidebar');
      var handle = document.getElementById('sidebar-resize-handle');
      if (!sidebar || !handle) return;

      var isResizing = false;
      var startX = 0;
      var startWidth = 0;

      handle.addEventListener('mousedown', function(e) {
        isResizing = true;
        startX = e.clientX;
        startWidth = sidebar.offsetWidth;
        handle.classList.add('dragging');
        document.body.style.cursor = 'col-resize';
        document.body.style.userSelect = 'none';
        e.preventDefault();
      });

      document.addEventListener('mousemove', function(e) {
        if (!isResizing) return;
        var diff = e.clientX - startX;
        var newWidth = startWidth + diff;
        var minWidth = 180;
        var maxWidth = 500;
        // Clamp value for smooth dragging at boundaries
        var clampedWidth = Math.max(minWidth, Math.min(maxWidth, newWidth));
        sidebar.style.width = clampedWidth + 'px';
      });

      var stopResize = function() {
        if (isResizing) {
          isResizing = false;
          handle.classList.remove('dragging');
          document.body.style.cursor = '';
          document.body.style.userSelect = '';
        }
      };

      document.addEventListener('mouseup', stopResize);
      // Fallback for edge cases where mouseup doesn't fire
      document.body.addEventListener('mouseleave', stopResize);
    },

    renderAll: function() {
      TreeView.render();
      if (this.currentView === 'gantt') {
        GanttView.render();
      } else {
        CalendarView.render();
      }
      this._updateStatusBar();
    },

    _bindToolbar: function() {
      var self = this;

      document.getElementById('btn-import').addEventListener('click', function() { self.importData(); });
      document.getElementById('btn-export').addEventListener('click', function() { self.exportData(); });
      document.getElementById('btn-export-excel').addEventListener('click', function() { self.exportToExcel(); });
      document.getElementById('btn-view-gantt').addEventListener('click', function() { self.switchView('gantt'); });
      document.getElementById('btn-view-calendar').addEventListener('click', function() { self.switchView('calendar'); });
      document.getElementById('btn-granularity-year').addEventListener('click', function() { self.switchGranularity('year'); });
      document.getElementById('btn-granularity-month').addEventListener('click', function() { self.switchGranularity('month'); });
      document.getElementById('btn-granularity-week').addEventListener('click', function() { self.switchGranularity('week'); });

      document.getElementById('btn-add-root-task').addEventListener('click', function() {
        self.showAddTask(null);
      });
    },

    switchView: function(view) {
      this.currentView = view;
      TaskManager.setSetting('lastView', view);
      this._updateViewButtons();
      this.renderAll();
    },

    switchGranularity: function(g) {
      GanttView.granularity = g;
      TaskManager.setSetting('lastGranularity', g);
      this._updateGranularityButtons();
      if (this.currentView === 'gantt') {
        GanttView.render();
      }
    },

    _updateViewButtons: function() {
      document.getElementById('btn-view-gantt').classList.toggle('active', this.currentView === 'gantt');
      document.getElementById('btn-view-calendar').classList.toggle('active', this.currentView === 'calendar');
    },

    _updateGranularityButtons: function() {
      document.getElementById('btn-granularity-year').classList.toggle('active', GanttView.granularity === 'year');
      document.getElementById('btn-granularity-month').classList.toggle('active', GanttView.granularity === 'month');
      document.getElementById('btn-granularity-week').classList.toggle('active', GanttView.granularity === 'week');
    },

    _updateStatusBar: function() {
      var allTasks = TaskManager.getAllTasks();
      var leafTasks = allTasks.filter(function(t) { return TaskManager.getChildren(t.id).length === 0; });
      var done = leafTasks.filter(function(t) { return t.status === 'done'; }).length;
      var inProgress = leafTasks.filter(function(t) { return t.status === 'inProgress'; }).length;
      document.getElementById('status-text').textContent =
        allTasks.length + ' 个任务 · ' + leafTasks.length + ' 个叶子任务（进行中 ' + inProgress + '，已完成 ' + done + '）';
      document.getElementById('status-info').textContent = 'PMWEB v2.0';
    },

    // -- Highlight sync --
    onTaskSelected: function(taskId) {
      TreeView.selectedTaskId = taskId;
      if (this.currentView === 'gantt') {
        GanttView.selectBar(taskId);
      } else {
        CalendarView.selectBar(taskId);
      }
    },

    onTaskHovered: function(taskId) {
      if (this.currentView === 'gantt') {
        if (taskId) GanttView.highlightBar(taskId);
        else GanttView.clearHighlight();
      } else {
        if (taskId) CalendarView.highlightBar(taskId);
        else CalendarView.clearHighlight();
      }
    },

    onGanttTaskClicked: function(taskId) {
      TreeView.highlightTask(taskId);
      TreeView.selectedTaskId = taskId;
      if (this.currentView === 'gantt') {
        GanttView.selectBar(taskId);
      }
    },

    // -- Task operations --
    showAddTask: function(parentId) {
      var self = this;
      ModalManager.showTaskForm(null, parentId, function(data) {
        var t = TaskManager.addTask(data.parentId, data.name);
        if (t) {
          TaskManager.updateTask(t.id, { description: data.description, assignee: data.assignee, startDate: data.startDate, endDate: data.endDate, status: data.status });
        }
        self.renderAll();
      });
    },

    showEditTask: function(taskId) {
      var self = this;
      var task = TaskManager.getTask(taskId);
      if (!task) return;
      ModalManager.showTaskForm(task, task.parentId, function(data) {
        TaskManager.updateTask(taskId, data);
        self.renderAll();
      });
    },

    deleteTask: function(taskId) {
      var self = this;
      var task = TaskManager.getTask(taskId);
      if (!task) return;
      ModalManager.confirm('确定要删除任务「' + task.name + '」及其所有子任务吗？', function() {
        TaskManager.deleteTask(taskId);
        self.renderAll();
      });
    },

    // -- Color picker --
    showColorPicker: function(taskId) {
      var task = TaskManager.getTask(taskId);
      if (!task) return;
      var currentColor = TaskManager.getEffectiveColor(task);
      var self = this;

      var swatchesHtml = TaskManager.COLORS.map(function(c) {
        return '<span class="color-swatch" data-color="' + c + '" style="display:inline-block;width:28px;height:28px;border-radius:50%;cursor:pointer;margin:3px;border:2px solid ' + (c === currentColor ? '#333' : 'transparent') + ';background:' + c + '"></span>';
      }).join('');

      ModalManager.open(
        '<div class="modal-title">选择颜色</div>'
        + '<div style="padding:8px 0;">' + swatchesHtml + '</div>'
        + '<div class="modal-actions">'
        + '<button onclick="ModalManager.close()">取消</button>'
        + '</div>'
      );

      document.querySelectorAll('.color-swatch').forEach(function(sw) {
        sw.addEventListener('click', function() {
          TaskManager.updateTask(taskId, { color: sw.dataset.color });
          ModalManager.close();
          self.renderAll();
        });
      });
    },

    // -- Milestone operations --
    showAddMilestoneAtDate: function(taskId, date) {
      var self = this;
      ModalManager.showMilestoneForm(null, { taskId: taskId }, function(data) {
        TaskManager.addMilestone(data.taskId, data.name, data.date, data.icon);
        self.renderAll();
      });
      var dateInput = document.getElementById('modal-ms-date');
      if (dateInput) dateInput.value = date;
    },

    showEditMilestone: function(milestoneId) {
      var self = this;
      var milestone = TaskManager.data.milestones.find(function(m) { return m.id === milestoneId; });
      if (!milestone) return;
      ModalManager.showMilestoneForm(milestone, { taskId: milestone.taskId }, function(data) {
        TaskManager.updateMilestone(milestoneId, data);
        self.renderAll();
      });
    },

    deleteMilestone: function(milestoneId) {
      var self = this;
      var milestone = TaskManager.data.milestones.find(function(m) { return m.id === milestoneId; });
      if (!milestone) return;
      ModalManager.confirm('确定要删除里程碑「' + milestone.name + '」吗？', function() {
        TaskManager.deleteMilestone(milestoneId);
        self.renderAll();
      });
    },

    // -- Import/Export --
    exportData: function() {
      DataStore.exportJSON(TaskManager.data);
    },

    importData: function() {
      var self = this;
      var input = document.createElement('input');
      input.type = 'file';
      input.accept = '.json';
      input.addEventListener('change', function(e) {
        var file = e.target.files[0];
        if (!file) return;
        DataStore.importJSON(file).then(function(data) {
          ModalManager.confirm('导入将覆盖当前所有数据，确定继续吗？', function() {
            TaskManager.replaceData(data);
            self.renderAll();
          });
        }).catch(function(err) {
          alert(err.message);
        });
      });
      input.click();
    },

    // -- Export to Excel --
    exportToExcel: function() {
      if (typeof XLSX === 'undefined') {
        alert('Excel 库未加载，请确保 xlsx.full.min.js 文件与 index.html 在同一目录下，并刷新页面重试。');
        console.log('XLSX status:', typeof XLSX);
        return;
      }

      var wb = XLSX.utils.book_new();
      var tasks = TaskManager.getAllTasks();
      var milestones = TaskManager.getAllMilestones();

      // ========== Sheet 1: 任务列表 ==========
      var taskHeaders = ['层级', '任务名称', '开始日期', '结束日期', '负责人', '状态', '颜色'];
      var taskData = [taskHeaders];

      // 递归生成任务列表（保持层级结构）
      function addTaskRow(task, depth) {
        var indent = '';
        for (var i = 1; i < depth; i++) indent += '　';
        if (depth > 1) indent += '├ ';

        var statusMap = { 'todo': '待办', 'in_progress': '进行中', 'done': '已完成' };
        var range = TaskManager.getDateRange(task);

        taskData.push([
          depth,
          indent + task.name,
          range.startDate || '',
          range.endDate || '',
          task.assignee || '',
          statusMap[task.status] || task.status,
          task.color || ''
        ]);

        var children = TaskManager.getChildren(task.id);
        children.forEach(function(child) {
          addTaskRow(child, depth + 1);
        });
      }

      var rootTasks = TaskManager.getRootTasks();
      rootTasks.forEach(function(task) {
        addTaskRow(task, 1);
      });

      var ws1 = XLSX.utils.aoa_to_sheet(taskData);
      ws1['!cols'] = [
        { wch: 6 },   // 层级
        { wch: 30 },  // 任务名称
        { wch: 12 },  // 开始日期
        { wch: 12 },  // 结束日期
        { wch: 10 },  // 负责人
        { wch: 8 },   // 状态
        { wch: 8 }    // 颜色
      ];
      XLSX.utils.book_append_sheet(wb, ws1, '任务列表');

      // ========== Sheet 2: 里程碑 ==========
      var msHeaders = ['任务名称', '里程碑名称', '日期', '图标'];
      var msData = [msHeaders];

      milestones.forEach(function(ms) {
        var task = TaskManager.getTask(ms.taskId);
        msData.push([
          task ? task.name : '',
          ms.name,
          ms.date,
          ms.icon
        ]);
      });

      var ws2 = XLSX.utils.aoa_to_sheet(msData);
      ws2['!cols'] = [
        { wch: 25 },  // 任务名称
        { wch: 20 },  // 里程碑名称
        { wch: 12 },  // 日期
        { wch: 6 }    // 图标
      ];
      XLSX.utils.book_append_sheet(wb, ws2, '里程碑');

      // ========== Sheet 3: 甘特图视图 ==========
      // 计算日期范围
      var allDates = [];
      tasks.forEach(function(t) {
        var range = TaskManager.getDateRange(t);
        if (range.startDate) allDates.push(range.startDate);
        if (range.endDate) allDates.push(range.endDate);
      });

      if (allDates.length === 0) {
        alert('没有任务数据可导出');
        return;
      }

      allDates.sort();
      var minDate = allDates[0];
      var maxDate = allDates[allDates.length - 1];

      // 生成日期列表
      var dateList = [];
      var d = new Date(minDate);
      var endDateObj = new Date(maxDate);
      while (d <= endDateObj) {
        dateList.push(DataStore.formatDate(new Date(d)));
        d.setDate(d.getDate() + 1);
      }

      // 构建甘特图数据
      var ganttHeaders = ['任务名称'].concat(dateList.map(function(dt) {
        return dt.slice(5); // MM-DD 格式
      }));
      var ganttData = [ganttHeaders];

      // 只导出叶子任务
      var leafTasks = tasks.filter(function(t) {
        return TaskManager.getChildren(t.id).length === 0;
      });

      leafTasks.forEach(function(task) {
        var range = TaskManager.getDateRange(task);
        var row = [task.name];
        var color = TaskManager.getEffectiveColor(task);

        dateList.forEach(function(dt) {
          if (range.startDate && range.endDate && dt >= range.startDate && dt <= range.endDate) {
            row.push('■'); // 使用方块符号表示
          } else {
            row.push('');
          }
        });

        ganttData.push(row);
      });

      var ws3 = XLSX.utils.aoa_to_sheet(ganttData);

      // 设置列宽
      var ganttCols = [{ wch: 25 }]; // 任务名称列
      dateList.forEach(function() {
        ganttCols.push({ wch: 4 }); // 日期列
      });
      ws3['!cols'] = ganttCols;

      XLSX.utils.book_append_sheet(wb, ws3, '甘特图');

      // 导出文件
      var filename = 'PMWEB_' + DataStore.formatDate(new Date()) + '.xlsx';
      XLSX.writeFile(wb, filename);
    }
  };

  // ============================================================
  // == 启动
  // ============================================================
  document.addEventListener('DOMContentLoaded', function() {
    App.init();
  });
  </script>
