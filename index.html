<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PMWEB - 项目管理</title>
  <style>
    :root {
      --color-bg: #f5f6fa;
      --color-surface: #ffffff;
      --color-border: #e0e0e0;
      --color-primary: #4a90d9;
      --color-primary-hover: #357abd;
      --color-text: #333333;
      --color-text-light: #888888;
      --color-danger: #e74c3c;
      --sidebar-width: 260px;
      --toolbar-height: 48px;
      --statusbar-height: 28px;
    }

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, "Microsoft YaHei", "PingFang SC", "Helvetica Neue", sans-serif;
      background: var(--color-bg);
      color: var(--color-text);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ===== TOOLBAR ===== */
    #toolbar {
      height: var(--toolbar-height);
      background: var(--color-surface);
      border-bottom: 1px solid var(--color-border);
      display: flex;
      align-items: center;
      padding: 0 12px;
      gap: 8px;
      flex-shrink: 0;
      z-index: 10;
    }

    #toolbar .toolbar-title {
      font-size: 16px;
      font-weight: 600;
      color: var(--color-text);
      margin-right: 8px;
    }

    #toolbar .toolbar-sep {
      width: 1px;
      height: 20px;
      background: var(--color-border);
      margin: 0 4px;
    }

    .btn {
      padding: 6px 12px;
      border: 1px solid var(--color-border);
      border-radius: 4px;
      background: var(--color-surface);
      color: var(--color-text);
      cursor: pointer;
      font-size: 13px;
      font-family: inherit;
      transition: background 0.15s, border-color 0.15s, color 0.15s;
      white-space: nowrap;
    }

    .btn:hover {
      background: var(--color-bg);
      border-color: var(--color-primary);
    }

    .btn.active {
      background: var(--color-primary);
      border-color: var(--color-primary);
      color: #ffffff;
    }

    .btn.btn-primary {
      background: var(--color-primary);
      border-color: var(--color-primary);
      color: #ffffff;
    }

    .btn.btn-primary:hover {
      background: var(--color-primary-hover);
      border-color: var(--color-primary-hover);
    }

    .btn.btn-danger {
      background: var(--color-danger);
      border-color: var(--color-danger);
      color: #ffffff;
    }

    .btn.btn-danger:hover {
      background: #c0392b;
      border-color: #c0392b;
    }

    #toolbar .btn-group {
      display: flex;
      gap: 4px;
      align-items: center;
    }

    #toolbar .spacer {
      flex: 1;
    }

    /* ===== MAIN CONTAINER ===== */
    #main-container {
      flex: 1;
      display: flex;
      flex-direction: row;
      overflow: hidden;
    }

    /* ===== SIDEBAR ===== */
    #sidebar {
      width: var(--sidebar-width);
      flex-shrink: 0;
      background: var(--color-surface);
      border-right: 1px solid var(--color-border);
      display: flex;
      flex-direction: column;
      overflow-y: auto;
    }

    #sidebar-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 14px;
      border-bottom: 1px solid var(--color-border);
      flex-shrink: 0;
    }

    #sidebar-header h2 {
      font-size: 14px;
      font-weight: 600;
      color: var(--color-text);
    }

    #btn-add-project {
      width: 26px;
      height: 26px;
      border-radius: 4px;
      border: 1px solid var(--color-border);
      background: var(--color-surface);
      color: var(--color-primary);
      font-size: 18px;
      line-height: 1;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: inherit;
      transition: background 0.15s;
    }

    #btn-add-project:hover {
      background: var(--color-primary);
      color: #ffffff;
      border-color: var(--color-primary);
    }

    #tree-container {
      flex: 1;
      padding: 8px 0;
    }

    .project-item {
      display: flex;
      align-items: center;
      padding: 8px 14px;
      cursor: pointer;
      border-left: 3px solid transparent;
      transition: background 0.1s;
      gap: 8px;
    }

    .project-item:hover {
      background: var(--color-bg);
    }

    .project-item.active {
      background: #eaf2fb;
      border-left-color: var(--color-primary);
    }

    .project-color-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .project-name {
      flex: 1;
      font-size: 13px;
      color: var(--color-text);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .project-actions {
      display: none;
      gap: 4px;
    }

    .project-item:hover .project-actions {
      display: flex;
    }

    .project-action-btn {
      width: 20px;
      height: 20px;
      border: none;
      background: transparent;
      cursor: pointer;
      font-size: 12px;
      color: var(--color-text-light);
      border-radius: 3px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: inherit;
    }

    .project-action-btn:hover {
      background: var(--color-border);
      color: var(--color-text);
    }

    #sidebar-empty {
      padding: 24px 14px;
      text-align: center;
      color: var(--color-text-light);
      font-size: 13px;
    }

    /* ===== CONTENT AREA ===== */
    #content-area {
      flex: 1;
      overflow: auto;
      position: relative;
      background: var(--color-bg);
    }

    #content-placeholder {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: var(--color-text-light);
      font-size: 14px;
    }

    /* ===== STATUS BAR ===== */
    #status-bar {
      height: var(--statusbar-height);
      background: var(--color-surface);
      border-top: 1px solid var(--color-border);
      display: flex;
      align-items: center;
      padding: 0 14px;
      gap: 16px;
      flex-shrink: 0;
      font-size: 12px;
      color: var(--color-text-light);
    }

    #status-bar .status-item {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    /* == 模态框 == */
    .modal-overlay {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.4);
      z-index: 1000;
      justify-content: center;
      align-items: center;
    }
    .modal-overlay.active { display: flex; }
    .modal-box {
      background: #fff;
      border-radius: 8px;
      padding: 24px;
      min-width: 360px;
      max-width: 500px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.15);
    }
    .modal-title {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 16px;
    }
    .modal-field {
      margin-bottom: 12px;
    }
    .modal-field label {
      display: block;
      font-size: 13px;
      color: var(--color-text-light);
      margin-bottom: 4px;
    }
    .modal-field input,
    .modal-field select {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid var(--color-border);
      border-radius: 4px;
      font-size: 14px;
    }
    .modal-actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      margin-top: 20px;
    }
    .modal-actions button {
      padding: 8px 16px;
      border-radius: 4px;
      border: 1px solid var(--color-border);
      cursor: pointer;
      font-size: 13px;
    }
    .modal-actions .btn-primary {
      background: var(--color-primary);
      color: #fff;
      border-color: var(--color-primary);
    }
    .modal-actions .btn-primary:hover { background: var(--color-primary-hover); }
    .modal-actions .btn-danger {
      background: var(--color-danger);
      color: #fff;
      border-color: var(--color-danger);
    }

    /* == 树形列表 == */
    .tree-project {
      border-bottom: 1px solid var(--color-border);
    }
    .tree-project-header {
      display: flex;
      align-items: center;
      padding: 8px 16px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      gap: 6px;
    }
    .tree-project-header:hover { background: #f5f5f5; }
    .tree-project-header .arrow {
      font-size: 10px;
      transition: transform 0.15s;
      color: var(--color-text-light);
    }
    .tree-project-header .arrow.collapsed { transform: rotate(-90deg); }
    .tree-project-header .color-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .tree-project-tasks {
      overflow: hidden;
    }
    .tree-project-tasks.collapsed {
      display: none;
    }
    .tree-task {
      display: flex;
      align-items: center;
      padding: 6px 16px 6px 36px;
      cursor: pointer;
      font-size: 13px;
      gap: 6px;
    }
    .tree-task:hover { background: #f0f4ff; }
    .tree-task.selected { background: #e3ecfa; }
    .tree-task .status-icon {
      font-size: 11px;
      flex-shrink: 0;
    }
    .tree-task .task-name {
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .tree-milestone-list {
      padding-left: 48px;
    }
    .tree-milestone {
      display: flex;
      align-items: center;
      padding: 3px 16px 3px 0;
      font-size: 12px;
      color: var(--color-text-light);
      gap: 4px;
      cursor: pointer;
    }
    .tree-milestone:hover { color: var(--color-text); }

    /* == 右键菜单 == */
    .context-menu {
      display: none;
      position: fixed;
      background: #fff;
      border: 1px solid var(--color-border);
      border-radius: 6px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.12);
      z-index: 2000;
      min-width: 140px;
      padding: 4px 0;
    }
    .context-menu.active { display: block; }
    .context-menu-item {
      padding: 8px 16px;
      font-size: 13px;
      cursor: pointer;
    }
    .context-menu-item:hover { background: #f0f4ff; }
    .context-menu-item.danger { color: var(--color-danger); }

    /* == 甘特图 == */
    .gantt-container {
      display: flex;
      flex-direction: column;
      height: 100%;
      overflow: hidden;
    }
    .gantt-header {
      display: flex;
      border-bottom: 1px solid var(--color-border);
      background: var(--color-surface);
      flex-shrink: 0;
    }
    .gantt-header-cell {
      flex-shrink: 0;
      text-align: center;
      font-size: 12px;
      color: var(--color-text-light);
      border-right: 1px solid #eee;
      padding: 6px 0;
      position: relative;
    }
    .gantt-body {
      flex: 1;
      overflow: auto;
      position: relative;
    }
    .gantt-row {
      display: flex;
      position: relative;
      height: 36px;
      border-bottom: 1px solid #f0f0f0;
      align-items: center;
    }
    .gantt-row:hover { background: #fafbfe; }
    .gantt-grid-cell {
      flex-shrink: 0;
      height: 100%;
      border-right: 1px solid #f0f0f0;
    }
    .gantt-grid-cell.today {
      background: rgba(74, 144, 217, 0.06);
    }
    .gantt-grid-cell.weekend {
      background: rgba(0,0,0,0.02);
    }
    .gantt-bar {
      position: absolute;
      height: 20px;
      border-radius: 3px;
      top: 8px;
      cursor: pointer;
      font-size: 11px;
      color: #fff;
      display: flex;
      align-items: center;
      padding: 0 6px;
      overflow: hidden;
      white-space: nowrap;
      min-width: 4px;
    }
    .gantt-bar:hover { filter: brightness(1.1); }
    .gantt-bar.status-done { opacity: 0.6; }
    .gantt-milestone {
      position: absolute;
      top: 6px;
      width: 16px; height: 16px;
      cursor: pointer;
      font-size: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 2;
      transform: translateX(-8px);
    }
    .gantt-milestone:hover { transform: translateX(-8px) scale(1.3); }
    .gantt-milestone-row {
      height: 28px;
      background: #fafafa;
    }
    .gantt-today-line {
      position: absolute;
      top: 0;
      bottom: 0;
      width: 2px;
      background: var(--color-danger);
      z-index: 5;
      pointer-events: none;
    }
    .gantt-empty {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: var(--color-text-light);
      font-size: 14px;
    }

    /* == 日历视图 == */
    .calendar-container {
      padding: 16px;
      height: 100%;
      display: flex;
      flex-direction: column;
    }
    .calendar-nav {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      margin-bottom: 12px;
      flex-shrink: 0;
    }
    .calendar-nav button {
      padding: 4px 12px;
      border: 1px solid var(--color-border);
      border-radius: 4px;
      background: var(--color-surface);
      cursor: pointer;
      font-size: 14px;
    }
    .calendar-nav button:hover { background: #f0f0f0; }
    .calendar-nav .month-label {
      font-size: 16px;
      font-weight: 600;
      min-width: 120px;
      text-align: center;
    }
    .calendar-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      flex: 1;
      gap: 1px;
      background: var(--color-border);
      border: 1px solid var(--color-border);
      border-radius: 4px;
      overflow: hidden;
    }
    .calendar-weekday {
      background: #f8f9fa;
      text-align: center;
      font-size: 12px;
      font-weight: 600;
      color: var(--color-text-light);
      padding: 8px 4px;
    }
    .calendar-day {
      background: var(--color-surface);
      min-height: 80px;
      padding: 4px;
      cursor: pointer;
      overflow: hidden;
    }
    .calendar-day:hover { background: #f8f9fc; }
    .calendar-day.other-month {
      background: #fafafa;
      color: #ccc;
    }
    .calendar-day.today {
      background: #f0f4ff;
    }
    .calendar-day-number {
      font-size: 12px;
      font-weight: 600;
      margin-bottom: 4px;
    }
    .calendar-task-bar {
      font-size: 10px;
      color: #fff;
      padding: 1px 4px;
      border-radius: 2px;
      margin-bottom: 2px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      cursor: pointer;
    }
    .calendar-milestone-item {
      font-size: 10px;
      display: flex;
      align-items: center;
      gap: 2px;
      cursor: pointer;
      color: var(--color-text);
    }
    .calendar-milestone-item:hover { font-weight: 600; }
  </style>
</head>
<body>

  <!-- TOOLBAR -->
  <div id="toolbar">
    <span class="toolbar-title">PMWEB</span>
    <div class="toolbar-sep"></div>
    <button class="btn" id="btn-project-manager">项目管理</button>
    <button class="btn" id="btn-import">导入</button>
    <button class="btn" id="btn-export">导出</button>
    <div class="toolbar-sep"></div>
    <div class="btn-group" id="view-toggle-group">
      <button class="btn active" id="btn-view-gantt" data-view="gantt">甘特图</button>
      <button class="btn" id="btn-view-calendar" data-view="calendar">日历</button>
    </div>
    <div class="toolbar-sep"></div>
    <div class="btn-group" id="granularity-group">
      <button class="btn" id="btn-granularity-year" data-gran="year">年</button>
      <button class="btn active" id="btn-granularity-month" data-gran="month">月</button>
      <button class="btn" id="btn-granularity-week" data-gran="week">周</button>
    </div>
    <div class="spacer"></div>
    <button class="btn btn-primary" id="btn-add-task">+ 新建任务</button>
  </div>

  <!-- MAIN CONTAINER -->
  <div id="main-container">

    <!-- SIDEBAR -->
    <div id="sidebar">
      <div id="sidebar-header">
        <h2>任务列表</h2>
        <button id="btn-add-project" title="新建项目">+</button>
      </div>
      <div id="tree-container">
        <div id="sidebar-empty">暂无项目，点击 + 新建</div>
      </div>
    </div>

    <!-- CONTENT AREA -->
    <div id="content-area">
      <div id="content-placeholder">请选择或新建项目</div>
    </div>

  </div>

  <!-- STATUS BAR -->
  <div id="status-bar">
    <span class="status-item" id="status-text">0 个项目 · 0 个任务（进行中 0，已完成 0）</span>
    <span class="spacer" style="flex:1"></span>
    <span class="status-item" id="status-info">PMWEB v1.0</span>
  </div>

  <!-- MODAL OVERLAY -->
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal-box" id="modal-box"></div>
  </div>

  <script>
  // ============================================================
  // DataStore — localStorage persistence + JSON import/export
  // ============================================================
  const DataStore = {
    STORAGE_KEY: 'pmweb_data',

    createEmpty() {
      return {
        version: 1,
        projects: [],
        tasks: [],
        milestones: [],
        settings: { lastView: 'gantt', lastGranularity: 'month' }
      };
    },

    load() {
      try {
        const raw = localStorage.getItem(this.STORAGE_KEY);
        if (!raw) return this.createEmpty();
        const data = JSON.parse(raw);
        if (!data.version || !Array.isArray(data.projects)) return this.createEmpty();
        return data;
      } catch (e) {
        console.error('DataStore.load failed:', e);
        return this.createEmpty();
      }
    },

    save(data) {
      try {
        localStorage.setItem(this.STORAGE_KEY, JSON.stringify(data));
      } catch (e) {
        console.error('DataStore.save failed:', e);
        alert('数据保存失败，可能 localStorage 已满');
      }
    },

    exportJSON(data) {
      const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'pmweb-backup-' + new Date().toISOString().slice(0, 10) + '.json';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    },

    importJSON(file) {
      return new Promise(function(resolve, reject) {
        const reader = new FileReader();
        reader.onload = function(e) {
          try {
            const data = JSON.parse(e.target.result);
            if (!data.version || !Array.isArray(data.projects) ||
                !Array.isArray(data.tasks) || !Array.isArray(data.milestones)) {
              reject(new Error('JSON 格式不正确：缺少必要字段'));
              return;
            }
            resolve(data);
          } catch (err) {
            reject(new Error('JSON 解析失败：文件内容无效'));
          }
        };
        reader.onerror = function() { reject(new Error('文件读取失败')); };
        reader.readAsText(file);
      });
    },

    // Use this instead of toISOString().slice(0,10) to avoid UTC timezone bugs
    formatDate(d) {
      return d.getFullYear() + '-' +
        String(d.getMonth() + 1).padStart(2, '0') + '-' +
        String(d.getDate()).padStart(2, '0');
    },

    uuid() {
      return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c) {
        const r = Math.random() * 16 | 0;
        return (c === 'x' ? r : (r & 0x3 | 0x8)).toString(16);
      });
    }
  };

  // ============================================================
  // ProjectManager — CRUD with validation
  // ============================================================
  const ProjectManager = {
    COLORS: [
      '#4a90d9', '#e67e22', '#2ecc71', '#9b59b6', '#e74c3c',
      '#1abc9c', '#f39c12', '#3498db', '#e91e63', '#00bcd4',
      '#8bc34a', '#ff5722'
    ],

    data: null,

    init() {
      this.data = DataStore.load();
      // Ensure arrays/settings exist for older stored formats
      if (!Array.isArray(this.data.tasks)) this.data.tasks = [];
      if (!Array.isArray(this.data.milestones)) this.data.milestones = [];
      if (!this.data.settings) this.data.settings = { lastView: 'gantt', lastGranularity: 'month' };
    },

    _save() {
      DataStore.save(this.data);
    },

    // ---- Projects ----

    getProjects() {
      return this.data.projects.slice().sort(function(a, b) {
        return (a.order || 0) - (b.order || 0);
      });
    },

    addProject(name) {
      const existingCount = this.data.projects.length;
      const color = this.COLORS[existingCount % this.COLORS.length];
      const project = {
        id: DataStore.uuid(),
        name: name,
        color: color,
        order: existingCount,
        createdAt: DataStore.formatDate(new Date())
      };
      this.data.projects.push(project);
      this._save();
      return project;
    },

    updateProject(id, updates) {
      const project = this.data.projects.find(function(p) { return p.id === id; });
      if (!project) return null;
      if (updates.name !== undefined) project.name = updates.name;
      if (updates.color !== undefined) project.color = updates.color;
      if (updates.order !== undefined) project.order = updates.order;
      this._save();
      return project;
    },

    deleteProject(id) {
      // Cascade: find all tasks belonging to this project
      const taskIds = this.data.tasks
        .filter(function(t) { return t.projectId === id; })
        .map(function(t) { return t.id; });

      // Remove milestones that belong to tasks of this project OR to the project directly
      this.data.milestones = this.data.milestones.filter(function(m) {
        if (m.projectId === id) return false;
        if (m.taskId && taskIds.indexOf(m.taskId) !== -1) return false;
        return true;
      });

      // Remove tasks
      this.data.tasks = this.data.tasks.filter(function(t) { return t.projectId !== id; });

      // Remove project
      this.data.projects = this.data.projects.filter(function(p) { return p.id !== id; });

      this._save();
    },

    // ---- Tasks ----

    getTasksByProject(projectId) {
      return this.data.tasks
        .filter(function(t) { return t.projectId === projectId; })
        .slice()
        .sort(function(a, b) { return (a.order || 0) - (b.order || 0); });
    },

    getAllTasks() {
      return this.data.tasks.slice();
    },

    addTask(projectId, name, startDate, endDate) {
      if (endDate < startDate) {
        alert('结束日期不能早于开始日期');
        return null;
      }
      const existingCount = this.data.tasks.filter(function(t) { return t.projectId === projectId; }).length;
      const task = {
        id: DataStore.uuid(),
        projectId: projectId,
        name: name,
        startDate: startDate,
        endDate: endDate,
        description: '',
        assignee: '',
        status: 'todo',
        order: existingCount,
        createdAt: DataStore.formatDate(new Date())
      };
      this.data.tasks.push(task);
      this._save();
      return task;
    },

    updateTask(id, updates) {
      const task = this.data.tasks.find(function(t) { return t.id === id; });
      if (!task) return null;

      const newStart = updates.startDate !== undefined ? updates.startDate : task.startDate;
      const newEnd = updates.endDate !== undefined ? updates.endDate : task.endDate;

      if (newEnd < newStart) {
        alert('结束日期不能早于开始日期');
        return null;
      }

      var allowed = ['name', 'description', 'assignee', 'startDate', 'endDate', 'status', 'order'];
      for (var i = 0; i < allowed.length; i++) {
        var key = allowed[i];
        if (updates[key] !== undefined) task[key] = updates[key];
      }
      this._save();
      return task;
    },

    deleteTask(id) {
      // Remove milestones belonging to this task
      this.data.milestones = this.data.milestones.filter(function(m) { return m.taskId !== id; });
      // Remove task
      this.data.tasks = this.data.tasks.filter(function(t) { return t.id !== id; });
      this._save();
    },

    // ---- Milestones ----

    getMilestonesByTask(taskId) {
      return this.data.milestones
        .filter(function(m) { return m.taskId === taskId; })
        .slice()
        .sort(function(a, b) { return a.date < b.date ? -1 : a.date > b.date ? 1 : 0; });
    },

    getMilestonesByProject(projectId) {
      // Project-level only: no taskId
      return this.data.milestones
        .filter(function(m) { return m.projectId === projectId && !m.taskId; })
        .slice()
        .sort(function(a, b) { return a.date < b.date ? -1 : a.date > b.date ? 1 : 0; });
    },

    getAllMilestones() {
      return this.data.milestones.slice();
    },

    addMilestone(name, date, icon, context) {
      // context: { taskId, projectId } — one must be non-null
      var taskId = context.taskId || null;
      var projectId = context.projectId || null;

      if (taskId) {
        // Validate date within task range
        const task = this.data.tasks.find(function(t) { return t.id === taskId; });
        if (task) {
          if (date < task.startDate || date > task.endDate) {
            alert('里程碑日期必须在任务日期范围内（' + task.startDate + ' 至 ' + task.endDate + '）');
            return null;
          }
        }
        projectId = null; // mutually exclusive
      } else {
        taskId = null;
      }

      const milestone = {
        id: DataStore.uuid(),
        name: name,
        date: date,
        icon: icon || '◆',
        taskId: taskId,
        projectId: projectId,
        createdAt: DataStore.formatDate(new Date())
      };
      this.data.milestones.push(milestone);
      this._save();
      return milestone;
    },

    updateMilestone(id, updates) {
      const milestone = this.data.milestones.find(function(m) { return m.id === id; });
      if (!milestone) return null;

      const newDate = updates.date !== undefined ? updates.date : milestone.date;

      // If task-level, validate date range
      if (milestone.taskId) {
        const task = this.data.tasks.find(function(t) { return t.id === milestone.taskId; });
        if (task) {
          if (newDate < task.startDate || newDate > task.endDate) {
            alert('里程碑日期必须在任务日期范围内（' + task.startDate + ' 至 ' + task.endDate + '）');
            return null;
          }
        }
      }

      var allowed = ['name', 'date', 'icon'];
      for (var i = 0; i < allowed.length; i++) {
        var key = allowed[i];
        if (updates[key] !== undefined) milestone[key] = updates[key];
      }
      this._save();
      return milestone;
    },

    deleteMilestone(id) {
      this.data.milestones = this.data.milestones.filter(function(m) { return m.id !== id; });
      this._save();
    },

    // ---- Settings ----

    getSetting(key) {
      return this.data.settings[key];
    },

    setSetting(key, value) {
      this.data.settings[key] = value;
      this._save();
    },

    // ---- Import ----

    replaceData(newData) {
      this.data = newData;
      this._save();
    }
  };

  const TreeView = {

    init() {
      this.container = document.getElementById('tree-container');
      this.contextMenu = document.getElementById('context-menu');
      document.addEventListener('click', () => this.hideContextMenu());

    render() {
      var projects = ProjectManager.getProjects();
      if (projects.length === 0) {
        this.container.innerHTML = '<div style="padding:24px 16px;color:var(--color-text-light);font-size:13px;text-align:center;">暂无项目<br>点击「项目管理」创建</div>';

      var self = this;

        var tasks = ProjectManager.getTasksByProject(project.id);

        html += '<div class="tree-project" data-project-id="' + project.id + '">';

          html += '<div class="tree-milestone" data-milestone-id="' + ms.id + '" data-project-id="' + project.id + '">';

          html += '<span>' + _escapeHtml(ms.name) + '</span>';

          var statusColor = task.status === 'done' ? '#2ecc71' : task.status === 'inProgress' ? '#f39c12' : '#ccc';

          html += '<div class="tree-task' + selected + '" data-task-id="' + task.id + '" data-project-id="' + project.id + '">';
          html += '<span class="status-icon" style="color:' + statusColor + '">' + statusIcon + '</span>';

          // Task-level milestones

          if (taskMilestones.length > 0) {
            html += '<div class="tree-milestone-list">';
            taskMilestones.forEach(function(ms) {
              html += '<div class="tree-milestone" data-milestone-id="' + ms.id + '" data-task-id="' + task.id + '">';

              html += '<span>' + _escapeHtml(ms.name) + '</span>';
              html += '<span style="margin-left:auto;font-size:11px;">' + ms.date.slice(5) + '</span>';
              html += '</div>';
            });
            html += '</div>';
          }
        });

        html += '</div></div>';
      });

      this._bindEvents();

      // Collapse/expand projects
      this.container.querySelectorAll('.tree-project-header').forEach(function(el) {

            { label: '编辑任务', action: function() { App.showEditTask(el.dataset.taskId); } },

      this.contextMenu.style.left = x + 'px';

      this.contextMenu.classList.add('active');

          self.hideContextMenu();
          items[i].action();
        });

    },

      this.contextMenu.classList.remove('active');
    }

  function _escapeHtml(str) {
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  // ============================================================
  // Parse YYYY-MM-DD as local time (not UTC)
  function _parseDate(str) {
    var parts = String(str).split('-');
    return new Date(parseInt(parts[0]), parseInt(parts[1]) - 1, parseInt(parts[2]));
  }

  // == GanttView: 甘特图渲染、时间轴计算、粒度切换
  // ============================================================
  const GanttView = {
    container: null,
    granularity: 'month', // 'year' | 'month' | 'week'
    cellWidth: 80,
    startDate: null,
    endDate: null,
    cells: [],

    init(container) {
      this.container = container;
    },

    setGranularity(g) {
      this.granularity = g;
      this.render();
    },

    _calcDateRange() {
      var tasks = ProjectManager.getAllTasks();
      var milestones = ProjectManager.getAllMilestones();
      var allDates = [];

      tasks.forEach(function(t) { allDates.push(t.startDate, t.endDate); });
      milestones.forEach(function(m) { allDates.push(m.date); });

      if (allDates.length === 0) {
        var now = new Date();
        this.startDate = new Date(now.getFullYear(), now.getMonth(), 1);
        this.endDate = new Date(now.getFullYear(), now.getMonth() + 2, 0);
        return;
      }

      allDates.sort();
      var minDate = _parseDate(allDates[0]);
      var maxDate = _parseDate(allDates[allDates.length - 1]);

      var pad = this.granularity === 'year' ? 30 : this.granularity === 'month' ? 14 : 7;
      this.startDate = new Date(minDate);
      this.startDate.setDate(this.startDate.getDate() - pad);
      this.endDate = new Date(maxDate);
      this.endDate.setDate(this.endDate.getDate() + pad);

      if (this.granularity === 'year') {
        this.startDate.setDate(1);
      } else if (this.granularity === 'month') {
        var day = this.startDate.getDay();
        this.startDate.setDate(this.startDate.getDate() - ((day + 6) % 7));
      }
    },

    _generateCells() {
      this.cells = [];
      var d = new Date(this.startDate);

      if (this.granularity === 'year') {
        this.cellWidth = 80;
        d.setDate(1);
        while (d <= this.endDate) {
          var label = d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0');
          var start = new Date(d);
          d.setMonth(d.getMonth() + 1);
          var end = new Date(d);
          end.setDate(end.getDate() - 1);
          this.cells.push({ label: label, start: start, end: end, days: this._daysBetween(start, end) + 1 });
        }
      } else if (this.granularity === 'month') {
        this.cellWidth = 80;
        var day = d.getDay();
        d.setDate(d.getDate() - ((day + 6) % 7));
        while (d <= this.endDate) {
          var start = new Date(d);
          d.setDate(d.getDate() + 7);
          var end = new Date(d);
          end.setDate(end.getDate() - 1);
          var weekNum = this._getWeekNumber(start);
          this.cells.push({ label: 'W' + weekNum, start: start, end: end, days: 7 });
        }
      } else {
        this.cellWidth = 40;
        while (d <= this.endDate) {
          var start = new Date(d);
          var dayOfWeek = d.getDay();
          var label = (d.getMonth() + 1) + '/' + d.getDate();
          this.cells.push({ label: label, start: start, end: new Date(d), days: 1, isWeekend: dayOfWeek === 0 || dayOfWeek === 6 });
          d.setDate(d.getDate() + 1);
        }
      }
    },

    _dateToX(dateStr) {
      var date = _parseDate(dateStr);
      var totalDays = this._daysBetween(this.startDate, this.endDate);
      var dayOffset = this._daysBetween(this.startDate, date);
      var totalWidth = this.cells.length * this.cellWidth;
      return (dayOffset / totalDays) * totalWidth;
    },

    _dateRangeToWidth(startStr, endStr) {
      var x1 = this._dateToX(startStr);
      var x2 = this._dateToX(endStr);
      var oneDayWidth = this._dateToX(
        DataStore.formatDate(new Date(_parseDate(startStr).getTime() + 86400000))
      ) - this._dateToX(startStr);
      return Math.max(x2 - x1 + oneDayWidth, 4);
    },

    _daysBetween(d1, d2) {
      var t1 = new Date(d1).setHours(0, 0, 0, 0);
      var t2 = new Date(d2).setHours(0, 0, 0, 0);
      return Math.round((t2 - t1) / 86400000);
    },

    _getWeekNumber(d) {
      var date = new Date(d);
      date.setHours(0, 0, 0, 0);
      date.setDate(date.getDate() + 3 - (date.getDay() + 6) % 7);
      var week1 = new Date(date.getFullYear(), 0, 4);
      return 1 + Math.round(((date - week1) / 86400000 - 3 + (week1.getDay() + 6) % 7) / 7);
    },

    render() {
      this._calcDateRange();
      this._generateCells();

      var projects = ProjectManager.getProjects();
      var allTasks = ProjectManager.getAllTasks();

      // Empty state
      if (allTasks.length === 0) {
        this.container.innerHTML = '<div class="gantt-empty">暂无任务，请先创建项目和任务</div>';
        return;
      }

      var totalWidth = this.cells.length * this.cellWidth;
      var today = DataStore.formatDate(new Date());
      var self = this;

      // Header
      var headerHtml = '<div class="gantt-header" style="width:' + totalWidth + 'px;">';
      this.cells.forEach(function(cell) {
        headerHtml += '<div class="gantt-header-cell" style="width:' + self.cellWidth + 'px;">' + cell.label + '</div>';
      });
      headerHtml += '</div>';

      // Body
      var bodyHtml = '<div class="gantt-body"><div style="position:relative;width:' + totalWidth + 'px;">';

      // Today line
      var todayX = this._dateToX(today);
      if (todayX >= 0 && todayX <= totalWidth) {
        bodyHtml += '<div class="gantt-today-line" style="left:' + todayX + 'px;"></div>';
      }

      projects.forEach(function(project) {
        var tasks = ProjectManager.getTasksByProject(project.id);
        var projectMilestones = ProjectManager.getMilestonesByProject(project.id);

        // Project-level milestones row
        if (projectMilestones.length > 0) {
          bodyHtml += '<div class="gantt-row gantt-milestone-row" style="width:' + totalWidth + 'px;">';
          self.cells.forEach(function(cell) {
            var cls = cell.isWeekend ? ' weekend' : '';
            bodyHtml += '<div class="gantt-grid-cell' + cls + '" style="width:' + self.cellWidth + 'px;"></div>';
          });
          projectMilestones.forEach(function(ms) {
            var x = self._dateToX(ms.date);
            bodyHtml += '<div class="gantt-milestone" style="left:' + x + 'px;color:' + project.color + ';" data-milestone-id="' + ms.id + '" title="' + _escapeHtml(ms.name) + ' (' + ms.date + ')">' + ms.icon + '</div>';
          });
          bodyHtml += '</div>';
        }

        tasks.forEach(function(task) {
          bodyHtml += '<div class="gantt-row" style="width:' + totalWidth + 'px;">';
          self.cells.forEach(function(cell) {
            var cls = cell.isWeekend ? ' weekend' : '';
            bodyHtml += '<div class="gantt-grid-cell' + cls + '" style="width:' + self.cellWidth + 'px;"></div>';
          });

          // Task bar
          var barX = self._dateToX(task.startDate);
          var barW = self._dateRangeToWidth(task.startDate, task.endDate);
          var statusCls = task.status === 'done' ? ' status-done' : '';
          var assigneeText = task.assignee ? ' [' + _escapeHtml(task.assignee) + ']' : '';
          bodyHtml += '<div class="gantt-bar' + statusCls + '" style="left:' + barX + 'px;width:' + barW + 'px;background:' + project.color + ';" data-task-id="' + task.id + '" title="' + _escapeHtml(task.name) + assigneeText + ' (' + task.startDate + ' ~ ' + task.endDate + ')">' + _escapeHtml(task.name) + '</div>';

          // Task-level milestones
          var taskMilestones = ProjectManager.getMilestonesByTask(task.id);
          taskMilestones.forEach(function(ms) {
            var msX = self._dateToX(ms.date);
            bodyHtml += '<div class="gantt-milestone" style="left:' + msX + 'px;color:' + project.color + ';" data-milestone-id="' + ms.id + '" title="' + _escapeHtml(ms.name) + ' (' + ms.date + ')">' + ms.icon + '</div>';
          });

          bodyHtml += '</div>';
        });
      });

      bodyHtml += '</div></div>';

      this.container.innerHTML = '<div class="gantt-container">' + headerHtml + bodyHtml + '</div>';

      // Bind click events
      this.container.querySelectorAll('.gantt-bar').forEach(function(el) {
        el.addEventListener('click', function() { App.showEditTask(el.dataset.taskId); });
      });
      this.container.querySelectorAll('.gantt-milestone').forEach(function(el) {
        el.addEventListener('click', function() { App.showEditMilestone(el.dataset.milestoneId); });
      });

      // Scroll to today
      var ganttBody = this.container.querySelector('.gantt-body');
      if (ganttBody && todayX > 0) {
        ganttBody.scrollLeft = Math.max(0, todayX - ganttBody.clientWidth / 2);
      }
    }
  };

  // ============================================================
  // == CalendarView: 月历渲染
  // ============================================================
  var CalendarView = {
    container: null,
    currentYear: new Date().getFullYear(),
    currentMonth: new Date().getMonth(),

    init: function(container) {
      this.container = container;
    },

    render: function() {
      var year = this.currentYear;
      var month = this.currentMonth;
      var today = new Date();
      var todayStr = DataStore.formatDate(today);
      var self = this;

      var monthNames = ['1月', '2月', '3月', '4月', '5月', '6月', '7月', '8月', '9月', '10月', '11月', '12月'];
      var html = '<div class="calendar-container">';
      html += '<div class="calendar-nav">';
      html += '<button id="cal-prev-month">◀</button>';
      html += '<span class="month-label">' + year + '年 ' + monthNames[month] + '</span>';
      html += '<button id="cal-next-month">▶</button>';
      html += '</div>';

      html += '<div class="calendar-grid">';

      var weekdays = ['一', '二', '三', '四', '五', '六', '日'];
      weekdays.forEach(function(d) {
        html += '<div class="calendar-weekday">' + d + '</div>';
      });

      var firstDay = new Date(year, month, 1);
      var startDay = new Date(firstDay);
      var dayOfWeek = (firstDay.getDay() + 6) % 7;
      startDay.setDate(startDay.getDate() - dayOfWeek);

      var allTasks = ProjectManager.getAllTasks();
      var allMilestones = ProjectManager.getAllMilestones();
      var projects = {};
      ProjectManager.getProjects().forEach(function(p) { projects[p.id] = p; });

      for (var i = 0; i < 42; i++) {
        var date = new Date(startDay);
        date.setDate(date.getDate() + i);
        var dateStr = DataStore.formatDate(date);
        var isCurrentMonth = date.getMonth() === month;
        var isToday = dateStr === todayStr;

        var cls = 'calendar-day';
        if (!isCurrentMonth) cls += ' other-month';
        if (isToday) cls += ' today';

        html += '<div class="' + cls + '" data-date="' + dateStr + '">';
        html += '<div class="calendar-day-number">' + date.getDate() + '</div>';

        // Tasks for this day
        allTasks.forEach(function(task) {
          if (dateStr >= task.startDate && dateStr <= task.endDate) {
            var project = projects[task.projectId];
            if (project) {
              var opacity = task.status === 'done' ? '0.5' : '1';
              var showName = dateStr === task.startDate || date.getDay() === 1;
              html += '<div class="calendar-task-bar" style="background:' + project.color + ';opacity:' + opacity + ';" data-task-id="' + task.id + '" title="' + _escapeHtml(task.name) + '">' + (showName ? _escapeHtml(task.name) : '&nbsp;') + '</div>';
            }
          }
        });

        // Milestones for this day
        allMilestones.forEach(function(ms) {
          if (ms.date === dateStr) {
            html += '<div class="calendar-milestone-item" data-milestone-id="' + ms.id + '" title="' + _escapeHtml(ms.name) + '">' + ms.icon + ' ' + _escapeHtml(ms.name) + '</div>';
          }
        });

        html += '</div>';
      }

      html += '</div></div>';
      this.container.innerHTML = html;

      // Bind navigation
      document.getElementById('cal-prev-month').addEventListener('click', function() {
        self.currentMonth--;
        if (self.currentMonth < 0) { self.currentMonth = 11; self.currentYear--; }
        self.render();
      });
      document.getElementById('cal-next-month').addEventListener('click', function() {
        self.currentMonth++;
        if (self.currentMonth > 11) { self.currentMonth = 0; self.currentYear++; }
        self.render();
      });

      // Click tasks
      this.container.querySelectorAll('.calendar-task-bar').forEach(function(el) {
        el.addEventListener('click', function(e) {
          e.stopPropagation();
          App.showEditTask(el.dataset.taskId);
        });
      });

      // Click milestones
      this.container.querySelectorAll('.calendar-milestone-item').forEach(function(el) {
        el.addEventListener('click', function(e) {
          e.stopPropagation();
          App.showEditMilestone(el.dataset.milestoneId);
        });
      });
    }
  };

  // ============================================================
  // == App: 初始化、事件绑定、视图切换
  // ============================================================
  var App = {
    currentView: 'gantt',

    init: function() {
      ProjectManager.init();
      ModalManager.init();
      TreeView.init();
      GanttView.init(document.getElementById('content-area'));
      CalendarView.init(document.getElementById('content-area'));

      this.currentView = ProjectManager.getSetting('lastView') || 'gantt';
      var granularity = ProjectManager.getSetting('lastGranularity') || 'month';
      GanttView.granularity = granularity;

      this._bindToolbar();
      this._updateViewButtons();
      this._updateGranularityButtons();
      this.renderAll();
    },

    renderAll: function() {
      TreeView.render();
      if (this.currentView === 'gantt') {
        GanttView.render();
      } else {
        CalendarView.render();
      }
      this._updateStatusBar();
    },

    _bindToolbar: function() {
      var self = this;

      document.getElementById('btn-project-manager').addEventListener('click', function() { self.showProjectManager(); });
      document.getElementById('btn-import').addEventListener('click', function() { self.importData(); });
      document.getElementById('btn-export').addEventListener('click', function() { self.exportData(); });
      document.getElementById('btn-view-gantt').addEventListener('click', function() { self.switchView('gantt'); });
      document.getElementById('btn-view-calendar').addEventListener('click', function() { self.switchView('calendar'); });
      document.getElementById('btn-granularity-year').addEventListener('click', function() { self.switchGranularity('year'); });
      document.getElementById('btn-granularity-month').addEventListener('click', function() { self.switchGranularity('month'); });
      document.getElementById('btn-granularity-week').addEventListener('click', function() { self.switchGranularity('week'); });

      document.getElementById('btn-add-task').addEventListener('click', function() {
        var projects = ProjectManager.getProjects();
        if (projects.length === 0) {
          alert('请先创建项目');
          self.showProjectManager();
          return;
        }
        if (projects.length === 1) {
          self.showAddTask(projects[0].id);
        } else {
          self._showProjectSelector(function(projectId) {
            self.showAddTask(projectId);
          });
        }
      });

      document.getElementById('btn-add-project').addEventListener('click', function() {
        self.showAddProject();
      });
    },

    switchView: function(view) {
      this.currentView = view;
      ProjectManager.setSetting('lastView', view);
      this._updateViewButtons();
      this.renderAll();
    },

    switchGranularity: function(g) {
      GanttView.granularity = g;
      ProjectManager.setSetting('lastGranularity', g);
      this._updateGranularityButtons();
      if (this.currentView === 'gantt') {
        GanttView.render();
      }
    },

    _updateViewButtons: function() {
      document.getElementById('btn-view-gantt').classList.toggle('active', this.currentView === 'gantt');
      document.getElementById('btn-view-calendar').classList.toggle('active', this.currentView === 'calendar');
    },

    _updateGranularityButtons: function() {
      document.getElementById('btn-granularity-year').classList.toggle('active', GanttView.granularity === 'year');
      document.getElementById('btn-granularity-month').classList.toggle('active', GanttView.granularity === 'month');
      document.getElementById('btn-granularity-week').classList.toggle('active', GanttView.granularity === 'week');
    },

    _updateStatusBar: function() {
      var projects = ProjectManager.getProjects();
      var tasks = ProjectManager.getAllTasks();
      var done = tasks.filter(function(t) { return t.status === 'done'; }).length;
      var inProgress = tasks.filter(function(t) { return t.status === 'inProgress'; }).length;
      document.getElementById('status-text').textContent =
        projects.length + ' 个项目 · ' + tasks.length + ' 个任务（进行中 ' + inProgress + '，已完成 ' + done + '）';
    },

    // -- Project operations --
    showProjectManager: function() {
      var projects = ProjectManager.getProjects();
      var listHtml = '';
      projects.forEach(function(p) {
        listHtml += '<div style="display:flex;align-items:center;padding:8px 0;border-bottom:1px solid #f0f0f0;gap:8px;">';
        listHtml += '<span style="width:14px;height:14px;border-radius:50%;background:' + p.color + ';flex-shrink:0;"></span>';
        listHtml += '<span style="flex:1;">' + _escapeHtml(p.name) + '</span>';
        listHtml += '<button style="padding:2px 8px;border:1px solid #ddd;border-radius:3px;background:#fff;cursor:pointer;font-size:12px;" onclick="App.showEditProject(\'' + _escapeHtml(p.id) + '\')">编辑</button>';
        listHtml += '<button style="padding:2px 8px;border:1px solid #ddd;border-radius:3px;background:#fff;cursor:pointer;font-size:12px;color:var(--color-danger);" onclick="App.deleteProject(\'' + _escapeHtml(p.id) + '\')">删除</button>';
        listHtml += '</div>';
      });
      if (projects.length === 0) {
        listHtml = '<p style="color:var(--color-text-light);text-align:center;padding:16px;">暂无项目</p>';
      }

      ModalManager.open(
        '<div class="modal-title">项目管理</div>'
        + '<div style="max-height:300px;overflow-y:auto;">' + listHtml + '</div>'
        + '<div class="modal-actions">'
        + '<button onclick="ModalManager.close()">关闭</button>'
        + '<button class="btn-primary" onclick="ModalManager.close();App.showAddProject();">新建项目</button>'
        + '</div>'
      );
    },

    showAddProject: function() {
      var self = this;
      ModalManager.showProjectForm(null, function(data) {
        var p = ProjectManager.addProject(data.name);
        if (p && data.color) ProjectManager.updateProject(p.id, { color: data.color });
        self.renderAll();
      });
    },

    showEditProject: function(projectId) {
      var self = this;
      var project = ProjectManager.data.projects.find(function(p) { return p.id === projectId; });
      if (!project) return;
      ModalManager.showProjectForm(project, function(data) {
        ProjectManager.updateProject(projectId, data);
        self.renderAll();
      });
    },

    deleteProject: function(projectId) {
      var self = this;
      var project = ProjectManager.data.projects.find(function(p) { return p.id === projectId; });
      if (!project) return;
      ModalManager.confirm('确定要删除项目「' + _escapeHtml(project.name) + '」及其所有任务和里程碑吗？', function() {
        ProjectManager.deleteProject(projectId);
        self.renderAll();
      });
    },

    // -- Task operations --
    showAddTask: function(projectId) {
      var self = this;
      ModalManager.showTaskForm(null, projectId, function(data) {
        var t = ProjectManager.addTask(data.projectId, data.name, data.startDate, data.endDate);
        if (t) {
          ProjectManager.updateTask(t.id, { description: data.description, assignee: data.assignee, status: data.status });
        }
        self.renderAll();
      });
    },

    showEditTask: function(taskId) {
      var self = this;
      var task = ProjectManager.data.tasks.find(function(t) { return t.id === taskId; });
      if (!task) return;
      ModalManager.showTaskForm(task, task.projectId, function(data) {
        ProjectManager.updateTask(taskId, data);
        self.renderAll();
      });
    },

    deleteTask: function(taskId) {
      var self = this;
      var task = ProjectManager.data.tasks.find(function(t) { return t.id === taskId; });
      if (!task) return;
      ModalManager.confirm('确定要删除任务「' + _escapeHtml(task.name) + '」吗？', function() {
        ProjectManager.deleteTask(taskId);
        self.renderAll();
      });
    },

    // -- Milestone operations --
    showAddTaskMilestone: function(taskId) {
      var self = this;
      ModalManager.showMilestoneForm(null, { taskId: taskId }, function(data) {
        ProjectManager.addMilestone(data.name, data.date, data.icon, { taskId: data.taskId });
        self.renderAll();
      });
    },

    showAddProjectMilestone: function(projectId) {
      var self = this;
      ModalManager.showMilestoneForm(null, { projectId: projectId }, function(data) {
        ProjectManager.addMilestone(data.name, data.date, data.icon, { projectId: data.projectId });
        self.renderAll();
      });
    },

    showEditMilestone: function(milestoneId) {
      var self = this;
      var milestone = ProjectManager.data.milestones.find(function(m) { return m.id === milestoneId; });
      if (!milestone) return;
      var parentInfo = milestone.taskId ? { taskId: milestone.taskId } : { projectId: milestone.projectId };
      ModalManager.showMilestoneForm(milestone, parentInfo, function(data) {
        ProjectManager.updateMilestone(milestoneId, data);
        self.renderAll();
      });
    },

    deleteMilestone: function(milestoneId) {
      var self = this;
      var milestone = ProjectManager.data.milestones.find(function(m) { return m.id === milestoneId; });
      if (!milestone) return;
      ModalManager.confirm('确定要删除里程碑「' + _escapeHtml(milestone.name) + '」吗？', function() {
        ProjectManager.deleteMilestone(milestoneId);
        self.renderAll();
      });
    },

    // -- Import/Export --
    exportData: function() {
      DataStore.exportJSON(ProjectManager.data);
    },

    importData: function() {
      var self = this;
      var input = document.createElement('input');
      input.type = 'file';
      input.accept = '.json';
      input.addEventListener('change', function(e) {
        var file = e.target.files[0];
        if (!file) return;
        DataStore.importJSON(file).then(function(data) {
          ModalManager.confirm('导入将覆盖当前所有数据，确定继续吗？', function() {
            ProjectManager.replaceData(data);
            self.renderAll();
          });
        }).catch(function(err) {
          alert(err.message);
        });
      });
      input.click();
    },

    // -- Helper: project selector --
    _showProjectSelector: function(onSelect) {
      var projects = ProjectManager.getProjects();
      var listHtml = '';
      projects.forEach(function(p) {
        listHtml += '<div style="display:flex;align-items:center;padding:10px 0;border-bottom:1px solid #f0f0f0;gap:8px;cursor:pointer;" class="project-select-item" data-project-id="' + p.id + '">';
        listHtml += '<span style="width:12px;height:12px;border-radius:50%;background:' + p.color + ';"></span>';
        listHtml += '<span>' + _escapeHtml(p.name) + '</span>';
        listHtml += '</div>';
      });
      ModalManager.open(
        '<div class="modal-title">选择项目</div>'
        + '<div>' + listHtml + '</div>'
      );
      document.querySelectorAll('.project-select-item').forEach(function(el) {
        el.addEventListener('click', function() {
          ModalManager.close();
          onSelect(el.dataset.projectId);
        });
      });
    }
  };

  // ============================================================
  // == 启动
  // ============================================================
  document.addEventListener('DOMContentLoaded', function() {
    App.init();
  });
  </script>

  <div class="context-menu" id="context-menu"></div>

</body>
</html>
